# Day 5 Quiz: Logic Gates to CPUs — How Billions of Dumb Switches Learn to Think

## New Questions (6)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why are NAND gates preferred over AND gates as the basic building block in CMOS logic design?"
prompt.distractors = [
    "AND gates require matched PMOS and NMOS sizing ratios that are difficult to achieve below 10nm process nodes",
    "NAND gates consume less static leakage power because their transistor stacking reduces subthreshold current paths",
    "AND gates produce glitches during input transitions that corrupt downstream logic in deep pipeline stages"
]
answer.answer = "CMOS transistors are naturally inverting, so NAND requires only 4 transistors while AND requires 6 (a NAND plus an inverter)"
context = "The simplest CMOS circuit — an inverter — inherently inverts its input. Building non-inverting gates requires an additional inverter stage. Since NAND includes the inversion naturally, it uses 4 transistors vs. 6 for AND. NAND is also faster than NOR because NMOS transistors (which drive the output low in a NAND) have 2-3x higher carrier mobility than PMOS."
id = "d5-q1-nand-preference"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What problem does a carry-lookahead adder solve, and how does it achieve this improvement?"
prompt.distractors = [
    "It eliminates transistor leakage in the adder tree by using dynamic logic gates that pre-charge during idle half-cycles",
    "It reduces the total transistor count by sharing partial product lines between adjacent bit positions in the adder",
    "It prevents metastability in the output flip-flops by generating stabilized carry signals before the clock edge arrives"
]
answer.answer = "It eliminates the serial carry ripple delay by pre-computing all carry bits in parallel using generate and propagate signals in O(log n) time"
context = "In a ripple carry adder, each bit position must wait for the carry from the previous position, giving O(n) delay. Carry-lookahead adders compute 'generate' (both inputs are 1) and 'propagate' (either input is 1) signals that allow all carries to be calculated simultaneously in O(log₂ n) gate delays. A 64-bit addition completes in ~12 gate delays instead of 128."
id = "d5-q2-carry-lookahead"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "How does two's complement representation eliminate the need for separate subtractor hardware in a CPU?"
prompt.distractors = [
    "Two's complement maps subtraction to a bitwise NOR operation followed by an increment, reusing the NOR array already present in the ALU",
    "Two's complement encodes negative numbers as shifted positive values, allowing the decoder to reroute operands through the existing multiplier",
    "Two's complement stores the sign in a separate flag register, allowing the same datapath to process unsigned magnitudes for both operations"
]
answer.answer = "Subtracting B from A becomes inverting all bits of B (via XOR with a control signal) and adding 1 via the carry-in, reusing the same adder circuit"
context = "In two's complement, -B equals ~B + 1 (bitwise inversion plus one). Hardware implements this by XORing each bit of B with a 'subtract' control signal (which inverts B when subtracting) and setting the adder's carry-in to 1. The same adder performs both addition and subtraction based on a single mode bit."
id = "d5-q3-twos-complement"

[[questions]]
type = "ShortAnswer"
prompt.prompt = "What type of circuit is formed when two NAND gates are cross-coupled (output of each connected to an input of the other)?"
answer.answer = "SR latch"
answer.alternatives = ["set-reset latch", "S-R latch", "latch", "bistable"]
context = "Cross-coupling two NAND gates creates a bistable circuit — the SR (Set-Reset) latch. It has two stable states and remains in whichever state it's pushed into, forming the fundamental building block of all digital memory. The D flip-flop builds on this by adding gating logic and edge-triggering."
id = "d5-q4-cross-coupled"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why does a modern CPU core like Intel's Golden Cove contain ~280 physical integer registers when the x86 ISA only exposes 16 general-purpose registers to programmers?"
prompt.distractors = [
    "The extra registers store microcode sequences that the decoder translates x86 instructions into before execution",
    "Each of the 16 architectural registers is replicated across multiple voltage domains to maintain signal integrity at high clock speeds",
    "The additional registers hold branch prediction history tables that track the outcome of recent conditional instructions"
]
answer.answer = "The extra physical registers enable register renaming, which eliminates false data dependencies and allows out-of-order execution of more instructions in parallel"
context = "Register renaming maps architectural registers to a larger pool of physical registers. This eliminates write-after-write and write-after-read hazards (false dependencies) that would otherwise force the CPU to serialize instructions unnecessarily. With 280 physical registers, the core can have hundreds of instructions in flight simultaneously, each using different physical registers even if they reference the same architectural register name."
id = "d5-q5-register-renaming"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is the fundamental difference between a calculator and a stored-program computer, as articulated by von Neumann in 1945?"
prompt.distractors = [
    "A calculator processes data in fixed-point arithmetic while a stored-program computer uses floating-point representation with configurable precision",
    "A calculator executes operations sequentially on a single data stream while a stored-program computer can process multiple data streams in parallel",
    "A calculator uses combinational logic without any clock signal while a stored-program computer requires a synchronous clock to sequence operations"
]
answer.answer = "A stored-program computer stores instructions in the same memory as data and uses a generic circuit that reads and executes them, making it programmable"
context = "Von Neumann's key insight (building on Turing and the ENIAC team) was that instructions and data should share the same memory, and a general-purpose execution unit should read instructions from memory and carry them out. This means the same hardware can run any program, unlike a calculator where operations are hardwired and fixed at manufacturing time."
id = "d5-q6-stored-program"

## Review Questions — Recent (Days 3-4)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "In photolithography, why is optical proximity correction (OPC) necessary even when the mask pattern is geometrically accurate?"
prompt.distractors = [
    "Photoresist molecules undergo thermal expansion during UV exposure, causing features to shrink by 5-10% relative to the mask dimensions",
    "The chromium absorber layer on the mask has a finite thickness that causes parallax errors at the edges of the exposure field",
    "Vibrations from the wafer stage motors during scanning introduce random positional jitter that blurs feature edges unpredictably"
]
answer.answer = "Diffraction causes light passing through mask features near or below the wavelength to spread and interfere, distorting the projected pattern on the wafer"
context = "When feature sizes approach the wavelength of light used (193nm for ArF immersion lithography), diffraction effects become severe. Light bends around mask edges, and interference between adjacent features causes corners to round, lines to shorten, and dense patterns to print differently from isolated ones. OPC pre-distorts the mask shapes so that the distorted aerial image produces the intended pattern."
id = "d5-q7-review-opc"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Moore's observation was not that transistors double every two years, but specifically that there is an optimal component count per chip that moves exponentially. What determines this optimum?"
prompt.distractors = [
    "The maximum number of metal interconnect layers that can be stacked before parasitic capacitance exceeds the transistor switching threshold",
    "The thermal design power envelope that limits how many active transistors can switch simultaneously without exceeding junction temperature limits",
    "The minimum transistor threshold voltage required to maintain acceptable noise margins as supply voltage scales with each process generation"
]
answer.answer = "The sweet spot where cost per transistor is lowest — too few wastes silicon area, too many crashes yield because defects kill oversized dies"
context = "Moore's Law is fundamentally an economic observation, not a physical one. At any given time, there's an optimal die size where the cost per transistor is minimized. Smaller dies waste expensive wafer area on scribe lanes and packaging overhead; larger dies have lower yield because a single defect kills a bigger (and more expensive) chip. This economic optimum moved at a consistent exponential rate."
id = "d5-q8-review-moores-optimum"

## Review Questions — Older (Days 1-2)

[[questions]]
type = "ShortAnswer"
prompt.prompt = "What crystal growth method is used to produce the monocrystalline silicon boules from which wafers are sliced?"
answer.answer = "Czochralski"
answer.alternatives = ["Czochralski method", "Czochralski process", "CZ", "CZ method"]
context = "The Czochralski (CZ) process involves dipping a seed crystal into molten silicon at ~1,414°C and slowly pulling it upward while rotating, growing a cylindrical monocrystalline ingot (boule). Modern boules for 300mm wafers are about 2 meters long and weigh over 100kg. The process requires extreme purity — less than one impurity atom per billion silicon atoms."
id = "d5-q9-review-czochralski"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why did the industry transition from planar MOSFETs to FinFET (tri-gate) transistors at the 22nm node?"
prompt.distractors = [
    "Planar MOSFETs could not achieve the threshold voltages needed for SRAM cell stability as supply voltage dropped below 0.9V",
    "The transition to copper interconnects at 22nm required a vertical transistor geometry to accommodate the different metal grain structure",
    "Planar gate oxides could not be deposited uniformly across 300mm wafers at the thicknesses required for 22nm feature dimensions"
]
answer.answer = "The gate in a planar MOSFET could no longer control the channel effectively at short lengths, causing excessive leakage; FinFETs wrap the gate around three sides of the channel for better electrostatic control"
context = "As planar MOSFETs shrank below ~30nm gate length, the gate lost electrostatic control of the channel — a problem called short-channel effects. Current leaked between source and drain even when the transistor was 'off.' FinFETs solve this by standing the channel on its side as a thin fin, with the gate wrapping around three surfaces. This tri-gate structure provides much stronger control, dramatically reducing leakage. Intel introduced FinFETs commercially at 22nm in 2012."
id = "d5-q10-review-finfet"
