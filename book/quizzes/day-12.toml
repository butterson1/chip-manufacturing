[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why does CMP remove material preferentially from high points on the wafer surface?"
prompt.distractors = [
    "The slurry's chemical etchant reacts faster with elevated copper regions due to higher local temperature from friction",
    "Abrasive particles are centrifugally concentrated toward protruding features by the pad's rotational dynamics",
    "The oxidizer in the slurry diffuses more rapidly to exposed high points due to shorter diffusion path lengths"
]
answer.answer = "The pad contacts high points with greater pressure, mechanically removing the passivation layer while recesses remain protected"
context = "CMP works through synergy: chemistry creates a thin passivation (oxide) layer everywhere, but the pad physically contacts only the high points, removing the oxide there. In low points/recesses, the pad doesn't reach, so the passivation layer protects the surface. This selective mechanical action is what drives planarization."
id = "41ed36af-a24b-48fa-a03f-6eed98564eec"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "At the 3 nm node, approximately how many separate CMP steps does a single wafer undergo during fabrication?"
prompt.distractors = [
    "5 to 8, primarily for copper metal layers and one STI planarization step early in the process",
    "10 to 13, covering each copper layer plus tungsten contact polishing at the transistor level",
    "35 to 40, with each metal layer requiring three distinct polish steps plus dielectric planarization"
]
answer.answer = "20 to 25, spanning copper layers, STI, gate CMP, tungsten plugs, and interlayer dielectric planarization"
context = "A 3 nm wafer goes through 20-25 CMP steps: 13-15 for copper metal layers, plus STI, poly/gate CMP, tungsten CMP, and ILD planarization. Each step uses its own slurry, pad, and recipe."
id = "94370a8a-e919-4aeb-bfac-f74de73d043d"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What role does benzotriazole (BTA) play in copper CMP slurry?"
prompt.distractors = [
    "It acts as a surfactant to prevent silica abrasive particles from agglomerating and settling out of suspension",
    "It serves as the primary oxidizing agent that converts metallic copper to a removable copper oxide layer",
    "It functions as a pH buffer to maintain the slurry in its optimal acidity range during extended polishing"
]
answer.answer = "It forms a protective film on copper in recessed areas, preventing unwanted chemical corrosion where material should be preserved"
context = "BTA is a corrosion inhibitor added at parts-per-million levels. It forms a protective film on copper surfaces, particularly in recesses where the pad doesn't make contact. This prevents chemical attack in trenches where you want copper to remain intact, reducing dishing."
id = "784527f5-b13e-4384-b3fb-d6bf5cfaf52d"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why was the semiconductor industry initially hostile to the idea of CMP?"
prompt.distractors = [
    "CMP required operating temperatures above 400°C, which risked damaging the copper interconnects already formed on the wafer",
    "The process consumed ten times more ultrapure water than any other fab step, threatening supply capacity at scale",
    "CMP pads degraded so rapidly that tool uptime was projected below 50%, making it economically unviable for production"
]
answer.answer = "It introduced abrasive particle slurry into an ultraclean environment where contamination control was the foundational engineering principle"
context = "Fabs spend billions on contamination control — HEPA filtration, ultrapure water, bunny suits. CMP introduces billions of abrasive nanoparticles in chemically active slurry, which seemed antithetical to cleanroom principles. The process was considered heresy when first proposed in the late 1980s."
id = "c83565ad-3462-475e-a9e2-d74e54f2cdbb"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is the purpose of in-situ diamond conditioning during CMP?"
prompt.distractors = [
    "It redistributes fresh slurry evenly across the pad by creating controlled turbulence in the slurry flow pattern",
    "It removes copper oxide debris embedded in the pad to prevent cross-contamination between successive wafers",
    "It heats the pad surface through friction to maintain optimal chemical reaction rates in the slurry film"
]
answer.answer = "It roughens the pad surface and reopens clogged micro-pores to maintain consistent slurry transport and removal rates"
context = "As CMP proceeds, the polyurethane pad glazes — pores fill with debris and the surface becomes smooth, losing its ability to hold slurry. The diamond conditioning disc continuously roughens the pad, removing ~1-3 μm of pad material per wafer to maintain consistent polishing performance."
id = "b537b9f9-5a6e-41c6-bc14-bf3d8c9173b6"

[[questions]]
type = "ShortAnswer"
prompt.prompt = "What company dominates the CMP tool market with its Reflexion system line?"
answer.answer = "Applied Materials"
answer.alternatives = ["AMAT", "applied materials"]
context = "Applied Materials is the leading supplier of CMP tools, with its Reflexion systems dominating the market. Ebara is the main competitor. Modern Reflexion tools feature 3-4 platens plus integrated post-CMP cleaning stations."
id = "24c8ce6e-cea2-47f8-9dfa-949409480ffc"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "In a standard copper damascene CMP process, why are multiple steps (typically three) required rather than a single polish?"
prompt.distractors = [
    "Each step uses the same slurry but progressively lower downforce to reduce the risk of delaminating fragile low-k dielectric layers",
    "The three steps correspond to three distinct copper grain structures that form at different depths during electroplating",
    "Multiple steps are needed because the CMP pad must be replaced between bulk removal and fine polishing due to particle loading"
]
answer.answer = "Different materials (bulk copper, TaN/Ta barrier, dielectric) require different slurry chemistries and selectivities for controlled removal"
context = "Step 1 aggressively removes bulk copper overburden. Step 2 uses a different slurry (often alumina-based, acidic) to remove the hard TaN/Ta barrier. Step 3 is a gentle buff with a soft pad. Each material has different hardness and chemistry, requiring tailored slurry formulations."
id = "ef29cea6-f071-4862-80e9-f0d709a2b530"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is 'dishing' in the context of copper CMP?"
prompt.distractors = [
    "The formation of raised copper bumps above wide trench features due to incomplete removal of the electroplated overburden",
    "The lateral erosion of dielectric material adjacent to copper lines caused by aggressive slurry chemistry during barrier polish",
    "The bowl-shaped deformation of the entire wafer caused by non-uniform downforce distribution across the carrier head"
]
answer.answer = "The recession of copper below the surrounding insulator surface in wide features due to excessive chemical attack during polishing"
context = "Dishing occurs when copper in wide trenches is over-polished — the soft copper recedes below the surrounding oxide surface. It's caused by too-aggressive slurry chemistry (excess oxidizer) and is worse in wide features where the pad can deform into the trench. It increases wire resistance and creates topography problems for subsequent layers."
id = "5578b815-bde3-4f6c-babe-e009668ec62d"

[[questions]]
type = "ShortAnswer"
prompt.prompt = "What is the approximate endpoint accuracy (in nanometers) that modern CMP tools achieve across the wafer at advanced nodes?"
answer.answer = "5"
answer.alternatives = ["5 nm", "±5 nm", "±5", "5nm"]
context = "Modern CMP tools combine motor current monitoring, optical endpoint detection, and eddy current sensing to achieve endpoint accuracy of approximately ±5 nm across the wafer — about 15 atomic layers of copper."
id = "7f2ab866-8c43-4a54-b9af-dab8cbe05ee1"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why do chip designers insert non-functional 'dummy fill' metal tiles into their layouts?"
prompt.distractors = [
    "Dummy tiles act as heat sinks to prevent localized thermal damage during CMP friction-generated temperature spikes",
    "They provide additional mechanical strength to prevent wafer warping during the high-pressure CMP polishing steps",
    "Dummy tiles serve as sacrificial structures that preferentially attract CMP defects away from functional circuit areas"
]
answer.answer = "They equalize metal pattern density across the die so that CMP removal rates are uniform and planarization is consistent"
context = "CMP removal rate depends on pattern density. Regions with low metal density (mostly insulator) planarize differently than dense regions. Dummy fill tiles bring all areas to a similar density (typically 20-80%), ensuring uniform planarization. These CMP design rules shape layouts as much as electrical requirements."
id = "b34c0645-3432-4b6c-a685-998fc4f1b135"
