answer.answer = "Ibiden, Shinko Electric, and AT&S hold 70%+ share, with 60-90 step processes taking 60-80 days and lead times stretching to 40-50 weeks"
context = "Three companies — Ibiden, Shinko Electric (Fujitsu subsidiary), and AT&S (Austrian) — dominate with 70%+ combined market share. Advanced substrates require 60-90 process steps, take 60-80 days to manufacture, and lead times stretch to 40-50 weeks during peak demand. A $50-100 substrate can constrain delivery of a $30,000+ GPU."
id = "d13-q08"

[[questions]]
type = "ShortAnswer"
prompt.prompt = "What is the approximate maximum area that a single EUV lithography exposure can print, known as the reticle limit?"
answer.answer = "858 mm²"
answer.alternatives = ["858mm2", "858 square mm", "~858 mm²", "about 858 mm²", "858"]
context = "The reticle limit is approximately 858 mm² (26 × 33 mm), set by the maximum field size of EUV scanners. Dies approaching this limit (like large GPUs at 600+ mm²) suffer severe yield penalties, which is a key driver of the chiplet approach — splitting designs into multiple smaller dies that each fit well within the reticle limit."
id = "d13-q09"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "AMD's 3D V-Cache technology stacks SRAM cache on top of a CPU die. What makes hybrid bonding critical for this application?"
prompt.distractors = [
    "Hybrid bonding enables the stacked SRAM to operate at the same voltage as the CPU die by eliminating the voltage drop across solder bumps",
    "Hybrid bonding allows the cache to be manufactured on a different process node than the CPU, reducing the cost of the SRAM chiplet by 40%",
    "Hybrid bonding provides thermal conductivity between the dies that is 10× better than micro-bumps, keeping the cache within operating temperature"
]
answer.answer = "The bond density is high enough and latency low enough that the CPU treats stacked cache as a seamless extension of its on-die L3 cache"
context = "Hybrid bonding's dense, low-latency connections (12,000/mm² at 9 µm pitch) make the boundary between the CPU die and stacked SRAM nearly invisible electrically. The CPU accesses the stacked cache with latency comparable to its own on-die L3 — software cannot distinguish between on-die and stacked cache. This seamless integration is only possible with hybrid bonding's density."
id = "d13-q10"
