[[questions]]
type = "MultipleChoice"
prompt.prompt = "Approximately what share of the global 300mm silicon wafer market do Shin-Etsu Chemical and SUMCO together control?"
prompt.distractors = [
    "They hold roughly 30-35% combined, with GlobalWafers and SK Siltron together controlling a larger share",
    "They hold roughly 75-80% combined, leaving minimal share for European and Taiwanese competitors",
    "They hold roughly 40-45% combined, roughly equal to the combined share of Siltronic and GlobalWafers"
]
answer.answer = "They hold roughly 55-60% combined, with GlobalWafers, SK Siltron, and Siltronic accounting for most of the rest"
context = "Shin-Etsu and SUMCO (both Japanese) together control approximately 55-60% of global 300mm wafer supply. Adding GlobalWafers (Taiwan), SK Siltron (South Korea), and Siltronic (Germany), five companies account for over 90% of the market."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why is EUV photoresist considered an especially potent supply chain chokepoint, given that the total photoresist cost per wafer is relatively low?"
prompt.distractors = [
    "Because EUV photoresist requires rare earth elements sourced exclusively from a single mine in Inner Mongolia, creating a mineral dependency",
    "Because EUV photoresist production requires the same EUV scanners used in chipmaking, creating a circular dependency on ASML tools",
    "Because EUV photoresist has a shelf life of only 48 hours after synthesis, making it impossible to stockpile for supply disruptions"
]
answer.answer = "Because the molecular-level chemistry requires parts-per-trillion defect densities and decades of accumulated process knowledge concentrated in a few Japanese firms"
context = "Japanese firms control ~91% of the global photoresist market and over 95% of EUV photoresist. EUV photoresists are chemically amplified polymers with photoacid generators requiring defect densities in parts per trillion — synthesis expertise that cannot be replicated simply by investing money."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Which of these correctly ranks the five dominant semiconductor equipment companies by their approximate annual revenue?"
prompt.distractors = [
    "Applied Materials (~$30B) > ASML (~$27B) > Lam Research (~$17B) > Tokyo Electron (~$16B) > KLA (~$11B)",
    "ASML (~$30B) > Tokyo Electron (~$27B) > Applied Materials (~$17B) > KLA (~$16B) > Lam Research (~$11B)",
    "ASML (~$30B) > Applied Materials (~$27B) > KLA (~$17B) > Lam Research (~$16B) > Tokyo Electron (~$11B)"
]
answer.answer = "ASML (~$30B) > Applied Materials (~$27B) > Lam Research (~$17B) > Tokyo Electron (~$16B) > KLA (~$11B)"
context = "ASML leads at ~$30B, followed by Applied Materials at ~$27B, Lam Research at ~$17B, Tokyo Electron at ~$16B, and KLA at ~$11B. Together these five account for 70-75% of all semiconductor equipment spending."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "A BCG/SIA study estimated that building a fully self-sufficient semiconductor supply chain in any single region would require approximately what level of upfront investment?"
prompt.distractors = [
    "Approximately $100 billion, roughly equivalent to building five leading-edge fabs with full equipment loadouts",
    "Approximately $250 billion, comparable to the combined annual R&D budgets of all major semiconductor companies",
    "Approximately $500 billion, roughly equal to the total annual revenue of the global semiconductor equipment industry over five years"
]
answer.answer = "Approximately $1 trillion, which would also raise chip prices by an estimated 35-65% due to lost economies of scale"
context = "The BCG/SIA 2021 study estimated $1 trillion in upfront investment for full self-sufficiency, with chip prices rising 35-65%. The figure is likely higher today given inflation and rising equipment costs."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What was the approximate economic impact of the 2020-2022 global chip shortage on the automotive industry alone?"
prompt.distractors = [
    "Roughly $50 billion in lost revenue, primarily from reduced production of electric vehicles requiring advanced chips",
    "Roughly $500 billion in lost revenue, causing several mid-tier automakers to file for bankruptcy protection",
    "Roughly $100 billion in lost revenue, split roughly evenly between European and North American manufacturers"
]
answer.answer = "Roughly $210 billion in lost revenue, demonstrating how semiconductor supply disruptions cascade through downstream industries"
context = "The 2020-2022 chip shortage cost the auto industry alone an estimated $210 billion in lost revenue, illustrating how disruptions in the semiconductor supply chain propagate into downstream industries worth trillions."

[[questions]]
type = "ShortAnswer"
prompt.prompt = "What specific event in 2022 caused semiconductor-grade neon prices to spike approximately 10×, highlighting the fragility of specialty gas supply chains?"
answer.answer = "Russia's invasion of Ukraine"
answer.alternatives = ["Russian invasion of Ukraine", "Ukraine war", "Russia-Ukraine war", "war in Ukraine"]
context = "Before Russia's invasion of Ukraine in 2022, Ukraine supplied roughly 50% of the world's semiconductor-grade neon, produced as a byproduct of steel manufacturing. The invasion caused neon prices to spike ~10×."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why did the U.S. specifically target EDA tools for gate-all-around (GAA) transistor design in its 2022 export controls against China?"
prompt.distractors = [
    "Because GAA tools were the most expensive EDA licenses, and restricting them would maximize financial pressure on Chinese chip companies",
    "Because GAA design tools were the only EDA products manufactured entirely within U.S. jurisdiction, making them legally simpler to restrict",
    "Because GAA design tools contained classified defense algorithms developed under DARPA contracts, triggering mandatory ITAR restrictions"
]
answer.answer = "Because China could still design chips at older nodes with existing tools, but GAA-specific tools were needed for 3nm and below, precisely targeting next-generation capability"
context = "The restriction on GAA EDA tools was a precision strike: China retained access to tools for older process nodes, but designing next-generation chips at 3nm and below became significantly harder without the latest Synopsys and Cadence releases supporting GAA architectures."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is the approximate lead time for ordering and receiving an ASML EUV scanner, and roughly how many can ASML produce per year?"
prompt.distractors = [
    "6-9 months lead time, with ASML producing approximately 150-200 systems per year across multiple assembly sites",
    "12-15 months lead time, with ASML producing approximately 80-100 systems per year at its Veldhoven facility",
    "36-48 months lead time, with ASML producing approximately 20-25 systems per year due to optics supply constraints from Zeiss"
]
answer.answer = "18-24 months lead time, with ASML producing approximately 50-60 systems per year, meaning new fabs must secure delivery slots years in advance"
context = "An EUV scanner takes 18-24 months from order to delivery, and ASML can only produce about 50-60 per year. Since a new fab needs 15-20 EUV tools, fab construction timelines are constrained by ASML's production capacity."

[[questions]]
type = "ShortAnswer"
prompt.prompt = "What are the three Japanese companies that dominate the ABF (Ajinomoto Build-up Film) substrate market for advanced chip packaging? Name at least two."
answer.answer = "Ibiden and Shinko Electric"
answer.alternatives = ["Ibiden, Shinko Electric, AT&S", "Ibiden and Shinko", "Ibiden, Shinko", "Shinko and Ibiden"]
context = "ABF substrates are manufactured primarily by Ibiden, Shinko Electric (a Fujitsu subsidiary), both Japanese, and AT&S (Austria). During the 2021-2022 shortage, ABF substrate lead times stretched to 50-70 weeks. (Note: AT&S is Austrian, not Japanese — the question was slightly tricky!)"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "The lesson argues that the semiconductor supply chain evolved toward concentration for a fundamental reason. What is the core tension this creates for industrial policy?"
prompt.distractors = [
    "Concentration enables faster innovation cycles but prevents developing nations from participating in the semiconductor value chain",
    "Concentration allows monopolistic pricing by dominant suppliers but reduces overall industry R&D investment over time",
    "Concentration creates geopolitical leverage for host nations but makes trade negotiations more complex across multilateral frameworks"
]
answer.answer = "Concentration is efficient — enabling deep R&D investment, economies of scale, and extreme quality — but this same optimization makes the system fragile to disruption"
context = "The supply chain concentrated because concentration is efficient: having 90% of photoresist in Japan enables massive R&D investment and sub-ppb purity. Distributing production would raise costs, dilute expertise, and lower quality. The tension between efficiency and resilience is the central dilemma of semiconductor industrial policy."
