[[questions]]
type = "MultipleChoice"
prompt.prompt = "What was the approximate share of global semiconductor manufacturing held by the United States in 2020, down from 37% in 1990?"
prompt.distractors = [
    "22%, primarily due to Intel and GlobalFoundries reducing domestic expansion",
    "18%, reflecting the gradual outsourcing of trailing-edge production to Asia",
    "6%, as virtually all remaining U.S. fabs had shifted to R&D-only operations"
]
answer.answer = "12%, with virtually none of it at leading-edge process nodes below 10nm"
context = "The U.S. share of global semiconductor manufacturing fell from 37% in 1990 to approximately 12% by 2020, and crucially, almost none of that remaining capacity was at leading-edge nodes (sub-10nm)."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "How much of the CHIPS and Science Act's $280 billion headline figure was directly allocated to semiconductor manufacturing and R&D?"
prompt.distractors = [
    "$98.4 billion, split between fab construction grants and equipment tax credits",
    "$139 billion, with the remainder funding broader STEM education programs",
    "$72.3 billion, including both direct grants and low-interest loan guarantees"
]
answer.answer = "$52.7 billion, with the remaining $200+ billion authorizing broader science funding"
context = "Despite the $280 billion headline, only $52.7 billion was directly allocated to semiconductor manufacturing incentives ($39B in grants/loans) and R&D ($13.2B). The rest authorized (but didn't appropriate) funding for NSF, DOE, and NIST programs."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is a key 'guardrail' provision of the CHIPS Act that recipients must accept?"
prompt.distractors = [
    "Recipients must manufacture at least 40% of their global output on U.S. soil within five years",
    "Recipients must license their process technology to at least two other domestic manufacturers",
    "Recipients must allocate 15% of fab capacity to U.S. government and defense contracts"
]
answer.answer = "Recipients cannot significantly expand leading-edge manufacturing in China for 10 years"
context = "The CHIPS Act guardrails prohibit recipients from significantly expanding leading-edge or advanced semiconductor manufacturing in China or other 'countries of concern' for 10 years, with clawback provisions if they violate these terms."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Which company received the largest single CHIPS Act award, and what was the approximate grant amount?"
prompt.distractors = [
    "TSMC received $9.2 billion in grants to build three advanced-node fabs in Arizona",
    "Samsung received $8.1 billion in grants for its Taylor, Texas GAA transistor fab",
    "Micron received $7.8 billion in grants for memory chip fabs in New York and Idaho"
]
answer.answer = "Intel received $8.5 billion in grants plus $11 billion in loans for multi-state expansion"
context = "Intel received the largest award: $8.5 billion in direct grants plus $11 billion in loans, reflecting its unique position as the only American company that both designs and manufactures leading-edge chips."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why does Europe's semiconductor strategy face a structural challenge that the U.S. and China do not?"
prompt.distractors = [
    "Europe lacks sufficient clean water and chemical supply infrastructure for advanced fabs",
    "European labor regulations prevent fabs from running the 24/7 shift schedules required",
    "The EU's GDPR data regulations create compliance barriers for semiconductor design tools"
]
answer.answer = "Europe lacks hyperscale cloud customers who consume massive volumes of leading-edge chips"
context = "Unlike the U.S. (AWS, Google, Microsoft, Meta) and China (Huawei, Alibaba, Baidu), Europe has no major hyperscale cloud providers buying leading-edge chips at massive scale. Building cutting-edge fabs without anchor customers is economically precarious."

[[questions]]
type = "ShortAnswer"
prompt.prompt = "What is the name of Japan's new company created to manufacture 2nm chips from scratch, using IBM's process technology?"
answer.answer = "Rapidus"
answer.alternatives = ["rapidus", "RAPIDUS"]
context = "Rapidus was founded in August 2022 by a consortium of Japanese companies including Toyota, Sony, NTT, and others. It licensed IBM's 2nm GAA nanosheet process technology and is building a fab in Chitose, Hokkaido."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What did the October 2022 U.S. export controls restrict regarding American workers in China's semiconductor industry?"
prompt.distractors = [
    "U.S. engineers were banned from publishing research papers co-authored with Chinese institutions",
    "American citizens were prohibited from attending semiconductor conferences held in mainland China",
    "U.S. nationals were barred from investing in or holding equity in Chinese chip companies"
]
answer.answer = "U.S. persons were prohibited from supporting development or production of advanced chips at Chinese fabs"
context = "The 'brain drain' provision prohibited U.S. citizens and permanent residents from supporting the development or production of advanced semiconductors at Chinese fabrication facilities, forcing dozens of American engineers working at Chinese chip companies to resign."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "South Korea's K-Chips Act and Mega Cluster strategy announced a headline figure of approximately ₩622 trillion ($472 billion). What does most of this figure represent?"
prompt.distractors = [
    "Direct government grants funded through a new semiconductor-specific national tax levy",
    "Low-interest government loans backed by the Bank of Korea's sovereign wealth reserves",
    "Joint public-private bonds issued by Samsung and SK Hynix with government guarantees"
]
answer.answer = "Projected private investment by Samsung and SK Hynix incentivized by enhanced tax credits"
context = "South Korea's enormous headline number is largely projected private investment through 2047, incentivized by enhanced tax credits (up to 25% for large companies, 35% for SMEs). It is essentially paying its champions to keep doing what they were already doing, but faster."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "According to BCG and SIA estimates, how much more does it cost to build and operate a new fab in the United States compared to Asia?"
prompt.distractors = [
    "10-20% more, primarily due to higher environmental compliance and permitting requirements",
    "50-80% more, driven mainly by the absence of integrated semiconductor supply chain clusters",
    "60-100% more, reflecting higher land costs and stricter seismic building code requirements"
]
answer.answer = "25-50% more, driven by higher construction labor, utilities, and fewer experienced workers"
context = "BCG and SIA estimated in 2020 that a new fab costs 25-50% more to build and operate in the United States than in Asia, due to higher construction labor costs, more expensive utilities, and fewer experienced semiconductor workers."

[[questions]]
type = "ShortAnswer"
prompt.prompt = "Which company cannot sell EUV lithography systems to China, a restriction effectively in place since 2019 and formalized in 2023 with expanded DUV restrictions?"
answer.answer = "ASML"
answer.alternatives = ["asml"]
context = "ASML, the sole manufacturer of EUV lithography systems, has been effectively blocked from selling EUV scanners to China since 2019. In January 2023, the Netherlands agreed to expand restrictions to also cover advanced DUV immersion scanners."
