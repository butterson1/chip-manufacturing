[[questions]]
type = "MultipleChoice"
prompt.prompt = "What percentage of semiconductors sold in 2024 were manufactured on process nodes below 10nm?"
prompt.distractors = [
    "Approximately 15%, representing the highest-revenue segment of the global chip market",
    "Approximately 10%, driven primarily by smartphone application processors and data center GPUs",
    "Approximately 25%, reflecting the rapid adoption of EUV lithography across major foundries"
]
answer.answer = "Fewer than 2%, despite accounting for roughly 15-20% of total industry revenue"
context = "The vast majority of chips — over 98% by unit volume — are built on nodes from 28nm to 350nm and beyond. Leading-edge logic chips dominate headlines but represent a tiny fraction of total semiconductor shipments."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why does analog IC design remain heavily dependent on human expertise rather than automated synthesis tools?"
prompt.distractors = [
    "Because analog foundries use proprietary 200mm equipment that is incompatible with modern EDA software platforms",
    "Because analog circuits require custom lithographic masks that cannot be generated by standard place-and-route tools",
    "Because international export controls restrict the use of automated analog design tools in most manufacturing regions"
]
answer.answer = "Because every transistor and passive component must be individually sized to balance noise, speed, power, area, and process variability trade-offs"
context = "Unlike digital design where logic synthesis converts RTL to gates automatically, analog circuits require hand-tuning of each component. There is no analog equivalent of logic synthesis, making the retiring workforce of experienced analog designers an existential concern."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What makes silicon carbide (SiC) superior to silicon for high-voltage power electronics in EVs?"
prompt.distractors = [
    "SiC has higher electron mobility (8,500 cm²/V·s vs 1,400 cm²/V·s), enabling faster switching at lower gate voltages",
    "SiC can be grown in larger boules using standard Czochralski pulling, reducing substrate costs by roughly 40%",
    "SiC is compatible with existing silicon fab equipment, allowing drop-in replacement on depreciated production lines"
]
answer.answer = "SiC's 3.26 eV bandgap allows 10× smaller die area for equivalent voltage blocking, 10× faster switching, and 200°C junction temperature operation"
context = "Silicon's 1.12 eV bandgap limits voltage handling and temperature tolerance. Tesla's Model 3 was the first mass-market EV to use a full SiC inverter, replacing 48 silicon IGBTs with 24 SiC MOSFETs and achieving 5-8% improvement in driving range purely from reduced power conversion losses."

[[questions]]
type = "ShortAnswer"
prompt.prompt = "Which company controls approximately 60% of global SiC substrate supply?"
answer.answer = "Wolfspeed"
answer.alternatives = ["Cree", "wolfspeed", "WOLFSPEED"]
context = "Wolfspeed (formerly Cree) dominates SiC substrate production from their 200mm fab in Marcy, New York — a $5 billion facility that opened in 2022."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "How does a MEMS accelerometer sense acceleration?"
prompt.distractors = [
    "A piezoelectric crystal generates voltage proportional to applied force, which is amplified by a charge-sensitive ASIC",
    "A thin-film strain gauge bonded to the package substrate changes resistance when the device is subjected to acceleration",
    "An optical interferometer measures displacement of a reflective membrane using a VCSEL laser integrated into the die"
]
answer.answer = "A silicon proof mass suspended on etched springs deflects under acceleration, changing femtofarad-level capacitance between interdigitated comb electrodes"
context = "MEMS accelerometers use capacitive sensing: the moving mechanical structures are typically 2-20 micrometers wide, suspended above cavities 1-3 micrometers deep. The ASIC measures tiny capacitance changes with 14-bit precision."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why do Sony's stacked CMOS image sensors use two separate wafers bonded together?"
prompt.distractors = [
    "Because the photodiode layer requires GaAs for higher quantum efficiency while the readout circuit needs standard silicon CMOS",
    "Because manufacturing yield for combined analog-digital dies drops below 30% when both are on a single wafer",
    "Because thermal isolation between the photosensitive layer and the hot logic circuitry prevents dark current degradation"
]
answer.answer = "So the photodiode array can use a process optimized for light sensitivity (40-90nm) while the logic uses a more advanced node (22nm or below) for processing speed"
context = "By fabricating each layer on its optimal process node and bonding them with copper-to-copper hybrid bonding, Sony can independently optimize light sensitivity and signal processing performance rather than compromising both on a single process."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why do analog chipmakers like Texas Instruments still own and operate their own fabs rather than going fabless?"
prompt.distractors = [
    "Because TSMC and Samsung refuse to accept analog design tape-outs due to the low wafer volumes involved",
    "Because U.S. export regulations require domestic manufacturing for any chip containing analog voltage references",
    "Because analog chips require 200mm wafers, which major foundries have entirely phased out of production"
]
answer.answer = "Because analog performance is intimately coupled to process details that commodity foundries won't customize, and long product lifecycles make depreciated fabs extremely profitable"
context = "TI's analog designs are tuned to specific process characteristics. Running mature 45nm-130nm processes on depreciated fabs yields extraordinary margins. TI achieves ~58% gross margins because wafer processing costs on paid-off 200mm equipment are $3,000-4,000 versus $16,000+ for 300mm at 3nm."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What key specification makes automotive semiconductor qualification fundamentally different from consumer chips?"
prompt.distractors = [
    "Automotive chips must operate at 0-85°C ambient with 10-year lifetime and defect rates below 100 DPPM",
    "Automotive chips require radiation hardening to MIL-STD-883 levels due to cosmic ray exposure during highway driving",
    "Automotive chips must use lead-free packaging and pass JEDEC moisture sensitivity Level 1 testing for crash safety"
]
answer.answer = "Automotive chips must operate at -40°C to 150-175°C, survive 15-20 years, and achieve defect rates below 1 DPPM"
context = "Consumer chips operate at 0-70°C for 3-5 years at 50-500 DPPM. Automotive requirements are dramatically more stringent — some safety-critical components target zero DPPM. This qualification burden is why automotive chips run on mature, well-characterized process nodes."

[[questions]]
type = "ShortAnswer"
prompt.prompt = "How many BAW or SAW filters can a single 5G smartphone contain?"
answer.answer = "over 100"
answer.alternatives = ["100", "100+", ">100", "more than 100"]
context = "5G phones need to separate dozens of frequency bands, requiring over 100 bulk acoustic wave (BAW) or surface acoustic wave (SAW) filters. This makes Broadcom's filter division (inherited from Avago) more valuable than most standalone semiconductor companies."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What strategic risk does China's aggressive mature-node fab expansion pose to Western analog chipmakers?"
prompt.distractors = [
    "Chinese fabs could acquire critical EDA tools for analog design, breaking the Synopsys/Cadence duopoly in the process",
    "Chinese fabs could corner the SiC and GaN substrate supply chain, cutting off wide-bandgap material access",
    "Chinese fabs could attract Western analog design talent with higher salaries, accelerating the analog talent shortage"
]
answer.answer = "Massive new 28nm-55nm capacity from SMIC, HuaHong, and Nexchip could flood the market with cheap commodity analog chips, devastating Western firms' profit margins"
context = "Western analog companies like TI and Analog Devices depend on high margins from depreciated fabs running mature nodes. If Chinese foundries add enormous capacity at the same nodes and sell at subsidized prices, it could undercut the business model that sustains the entire Western analog semiconductor ecosystem."
