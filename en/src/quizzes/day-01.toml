[[questions]]
type = "MultipleChoice"
prompt.prompt = "What fundamental problem made vacuum tubes impractical for large-scale computing?"
prompt.distractors = [
    "Tubes could only amplify analog signals and lacked the ability to perform digital switching operations",
    "Tubes required rare earth metals that were expensive to source and difficult to refine at scale",
    "Tubes operated at frequencies too low for meaningful computation and couldn't be clocked above 1 kHz"
]
answer.answer = "Tubes generated excessive heat, burned out frequently, and were physically too large to scale to millions of switches"
context = "ENIAC's 17,468 vacuum tubes consumed 150 kW, failed every ~5.6 hours on average, and filled a 50×30 foot room. Scaling to millions of switches was physically impossible."
id = "4e9d2ab2-1fc6-412b-8c35-2d7ee5ef8eec"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "In an NMOS MOSFET, what physically happens in the channel region when a positive voltage is applied to the gate?"
prompt.distractors = [
    "Holes from the p-type substrate are accelerated toward the drain, forming a conductive path through kinetic energy transfer",
    "The oxide layer becomes conductive through dielectric breakdown, allowing current to flow directly from gate to channel",
    "Dopant atoms physically migrate toward the surface under the electric field, permanently converting the channel to n-type"
]
answer.answer = "The electric field repels holes and attracts electrons to the surface, forming a thin n-type inversion layer that connects source to drain"
context = "The gate's electric field penetrates the oxide and repels majority carriers (holes) while attracting minority carriers (electrons) to the silicon surface. Above threshold voltage, this inversion layer creates a continuous n-type path."
id = "0f2fb288-bb55-4331-ad34-11cef9b305af"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why does CMOS technology consume dramatically less static power than earlier NMOS-only logic?"
prompt.distractors = [
    "CMOS circuits use thicker gate oxides that reduce tunneling leakage current by several orders of magnitude",
    "CMOS transistors are fabricated with higher-purity silicon that has fewer defect states to carry leakage current",
    "CMOS circuits operate at lower supply voltages which reduces static power by the square of the voltage ratio"
]
answer.answer = "In each CMOS gate, complementary NMOS and PMOS transistors ensure one is always off, so current flows only during switching transitions"
context = "Frank Wanlass's 1963 CMOS patent pairs NMOS and PMOS in push-pull: in any steady state, one transistor blocks current. Power is consumed only during switching, making static dissipation nearly zero."
id = "dd6570c8-d179-46fd-b304-f33319352826"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What problem forced the semiconductor industry to replace silicon dioxide (SiO₂) gate oxide with high-k dielectrics around the 45nm node?"
prompt.distractors = [
    "SiO₂ films developed microscopic pinholes during deposition at thicknesses below 5nm, causing catastrophic short circuits",
    "SiO₂ became chemically unstable at the higher annealing temperatures required by smaller process nodes above 1,100°C",
    "SiO₂ could not withstand the mechanical stress of copper interconnect expansion during thermal cycling in advanced nodes"
]
answer.answer = "SiO₂ layers thinner than about 1.5nm allowed significant quantum tunneling of electrons through the oxide, causing unacceptable leakage current"
context = "Below ~1.5nm of SiO₂, electrons tunnel quantum-mechanically through the barrier. High-k materials like HfO₂ provide equivalent capacitive coupling in a physically thicker layer, suppressing tunneling."
id = "2dd2c68b-022c-49a3-9621-d9a8a6d4009e"

[[questions]]
type = "ShortAnswer"
prompt.prompt = "What type of transistor structure, introduced by Intel at 22nm in 2011, wraps the gate around a vertical channel fin on three sides?"
answer.answer = "FinFET"
answer.alternatives = ["Fin-FET", "finfet", "fin FET"]
context = "FinFET transistors replaced planar MOSFETs at 22nm. The channel protrudes vertically like a fin, and the gate wraps around three sides for better electrostatic control and reduced leakage."
id = "9a325d68-7894-4152-be0d-b6e2502b2a1a"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "A CMOS NAND gate requires how many transistors, and in what configuration?"
prompt.distractors = [
    "Six transistors: two NMOS in parallel, two PMOS in series, plus two additional NMOS for output buffering",
    "Two transistors: one NMOS and one PMOS connected with cross-coupled feedback to implement the NAND function",
    "Four transistors: two NMOS in parallel and two PMOS in series, with shared gate connections"
]
answer.answer = "Four transistors: two NMOS in series and two PMOS in parallel, pulling the output low only when both inputs are high"
context = "A 2-input CMOS NAND uses two series NMOS (both must be on to pull output low) and two parallel PMOS (either pulls output high). This gives the NAND truth table with complementary operation."
id = "92ee7b03-dd70-404d-b0a8-a7074a3baaa5"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why is the MOSFET's gate being electrically insulated from the channel considered its most important design advantage over the BJT?"
prompt.distractors = [
    "Insulation allows the gate to operate at much higher voltages without breakdown, enabling stronger drive current per transistor",
    "Insulation prevents electromagnetic interference between adjacent transistors, enabling much denser packing on the die",
    "Insulation makes the gate immune to temperature variations, giving MOSFETs superior performance in high-heat environments"
]
answer.answer = "Insulation means the gate draws essentially zero steady-state current, drastically reducing power consumption when billions of transistors are integrated"
context = "The insulated gate is the 'field effect' — voltage controls the channel without current flowing through the gate. This near-zero gate current is critical when scaling to billions of transistors, unlike BJTs where the base draws continuous current."
id = "24277f18-feed-44f7-9882-5ecb29d369cc"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Approximately how much does a single transistor cost on TSMC's leading-edge 3nm process?"
prompt.distractors = [
    "About $0.00005 — five hundred-thousandths of a dollar, comparable to a single grain of commodity rice",
    "About $0.0000005 — five ten-millionths of a dollar, roughly the cost of one pixel of printer ink",
    "About $0.00000005 — fifty billionths of a dollar, approximately the cost of a single bacterium's weight in sugar"
]
answer.answer = "About $0.000000005 — five billionths of a dollar, making transistors the cheapest manufactured objects on Earth per unit"
context = "At ~$0.000000005 each, transistors are absurdly cheap per unit. But the fabs that produce them cost $19+ billion to build, and individual EUV lithography machines cost $380 million each."
id = "02f976d9-7840-416b-860c-a8f95cc2c62a"

[[questions]]
type = "ShortAnswer"
prompt.prompt = "Who were the two Bell Labs physicists who demonstrated the first working transistor on December 23, 1947?"
answer.answer = "Bardeen and Brattain"
answer.alternatives = ["John Bardeen and Walter Brattain", "Bardeen & Brattain", "Walter Brattain and John Bardeen"]
context = "John Bardeen and Walter Brattain built the first point-contact transistor at Bell Labs, with theoretical guidance from William Shockley. All three shared the 1956 Nobel Prize in Physics."
id = "7a4663e7-ca23-406a-a9d7-b502c18c9498"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What approach will succeed FinFETs at the 2nm node and beyond, offering improved gate control over the channel?"
prompt.distractors = [
    "Planar SOI transistors that use ultra-thin silicon-on-insulator substrates to limit channel thickness to 2-3 atomic layers",
    "Tunnel FETs that exploit quantum tunneling as the primary switching mechanism rather than thermionic carrier injection",
    "Negative capacitance FETs that use ferroelectric gate oxides to amplify the gate's electric field beyond classical limits"
]
answer.answer = "Gate-All-Around (GAA) nanosheet transistors where the gate completely surrounds stacked silicon channel layers on all four sides"
context = "GAA/nanosheet transistors wrap the gate around the channel on all four sides (vs. three for FinFET). Samsung and TSMC are introducing GAA at the 2nm generation, using stacked nanosheets for better electrostatic control."
id = "6102e3cc-2a41-4493-a84d-f0078a057ba0"
