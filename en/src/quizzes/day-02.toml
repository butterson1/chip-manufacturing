# Day 2 Quiz: Silicon Wafers — From Sand to the Purest Material Humans Make

## New Questions (6)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What purity level does electronic-grade silicon achieve, and why is this necessary?"
prompt.distractors = [
    "Six-nines purity (99.9999%), because lithography tools need a defect-free optical surface for light reflection",
    "Nine-nines purity (99.9999999%), because wire sawing creates subsurface damage that must be chemically removed",
    "Eight-nines purity (99.999999%), because the Czochralski process cannot incorporate impurities above this threshold"
]
answer.answer = "Eleven-nines purity (99.999999999%), because even parts-per-billion impurities can trap electrons and kill transistors"
context = "Semiconductor silicon achieves 99.999999999% purity (eleven nines). At the scale of 100 billion transistors per chip, even a single misplaced impurity atom can trap electrons, cause current leakage, and destroy a transistor."
id = "9337f0cf-ef8a-41f7-9cf6-b0eea4c4c785"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "In the Siemens process, why is removing boron from trichlorosilane particularly difficult compared to iron or aluminum impurities?"
prompt.distractors = [
    "Boron forms a stable oxide layer in the distillation column that resists chemical separation at standard pressures",
    "Boron atoms have nearly the same atomic mass as silicon, making centrifugal separation methods ineffective",
    "Boron trichloride reacts with hydrogen chloride in the column, forming complex compounds that co-distill with TCS"
]
answer.answer = "Boron trichloride boils at 12.5°C, very close to trichlorosilane's 31.8°C boiling point, making distillation separation difficult"
context = "Iron chloride (316°C) and aluminum chloride (180°C) have boiling points far from TCS (31.8°C), making them easy to separate. But boron trichloride boils at 12.5°C — only 19°C below TCS — requiring distillation columns with hundreds of theoretical plates."
id = "bb88d9b5-fd5a-4526-8e9a-a480cd3e7fee"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why was the industry's planned transition to 450mm wafers effectively abandoned around 2017?"
prompt.distractors = [
    "Czochralski crystal pullers couldn't maintain defect-free growth above 300mm diameter due to thermal gradient limitations",
    "The silicon wafer suppliers in Japan refused to invest in 450mm tooling due to concerns about market oversupply",
    "International trade restrictions prevented the export of 450mm-capable lithography equipment to leading-edge fabs"
]
answer.answer = "Equipment development costs exceeded $20 billion industry-wide, while EUV lithography and advanced packaging offered better returns"
context = "The G450C consortium at SUNY Polytechnic was abandoned around 2017. New lithography, deposition, and handling tools for 450mm wafers would have cost over $20 billion, and the industry decided that EUV and advanced packaging were more cost-effective ways to improve chip economics."
id = "e4ca2f8b-484f-4c4b-ba40-84ed76bede29"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "During Czochralski crystal growth, what is the primary source of oxygen contamination in the silicon boule?"
prompt.distractors = [
    "Residual water vapor in the argon atmosphere reacts with the molten silicon surface at 1,414°C to release oxygen atoms",
    "The polysilicon feedstock retains trace oxygen from the Siemens deposition process that cannot be removed by remelting",
    "The seed crystal oxidizes slightly upon initial contact with the melt, introducing oxygen atoms into the growth interface"
]
answer.answer = "The fused silica crucible slowly dissolves into the molten silicon, releasing oxygen atoms into the melt throughout the growth run"
context = "The SiO₂ crucible holding the molten silicon gradually dissolves during the 24-72 hour crystal growth process, introducing oxygen. This is an inherent trade-off — you need a crucible that can survive 1,414°C contact with molten silicon, and fused silica is the best option despite its slow dissolution."
id = "37dfdbbe-9023-4ec7-8548-3f26c17c6780"

[[questions]]
type = "ShortAnswer"
prompt.prompt = "What is the name of the process used to convert metallurgical-grade silicon into ultra-pure polysilicon via gaseous trichlorosilane?"
answer.answer = "Siemens process"
answer.alternatives = ["Siemens", "siemens process", "the Siemens process"]
context = "The Siemens process converts MG-Si to trichlorosilane gas, purifies it by fractional distillation, then deposits pure silicon onto heated rods via chemical vapor deposition. It has been the dominant polysilicon purification method since the 1950s."
id = "187f2b87-4429-4336-b5d7-d8c4e1ecbd2d"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "How flat is a finished 300mm silicon wafer, and why does this level of flatness matter?"
prompt.distractors = [
    "Flat to ±5 nanometers, which is necessary because wire bonding during packaging requires precise surface topology alignment",
    "Flat to ±50 nanometers, which is necessary because epitaxial layer growth requires uniform thermal contact across the surface",
    "Flat to ±10 nanometers, which is necessary because ion implantation dosage varies with surface angle relative to the beam"
]
answer.answer = "Flat to ±0.5 nanometers, which is necessary because lithography systems focus light to nanometer-scale features and any surface variation ruins the pattern"
context = "CMP polishing achieves ±0.5nm flatness across a 300mm wafer. Since lithography prints features just a few nanometers wide, even tiny surface bumps throw off the focus and ruin the circuit pattern. Scaled to the size of the US, the tallest bump would be about 2cm."
id = "10468ed8-44a4-4795-9a6d-96bf5c68b134"

## Recent Review — Day 1 (2)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What fundamental problem with vacuum tubes motivated the search for solid-state transistors in the 1940s?"
prompt.distractors = [
    "Vacuum tubes could only amplify signals but couldn't function as digital switches needed for binary computation",
    "Vacuum tubes required rare earth materials that were expensive and difficult to source during postwar shortages",
    "Vacuum tubes operated at frequencies too low for the radio communication applications that drove early computing"
]
answer.answer = "Vacuum tubes generated excessive heat, were physically large, and failed frequently — making systems with thousands of them impractical to scale"
context = "ENIAC used 17,468 vacuum tubes, consumed 150 kW, filled a large room, and had a mean time between failures of about 5.6 hours. Each tube dissipated 1-2 watts and had a hot filament that aged and cracked. Scaling to millions of tubes was physically impossible."
id = "3f516f5f-5f8b-428e-aac1-3423feade77d"

[[questions]]
type = "ShortAnswer"
prompt.prompt = "What type of transistor architecture succeeded FinFET and is now used in the latest process nodes (Samsung 3nm, Intel 20A)?"
answer.answer = "GAA"
answer.alternatives = ["gate-all-around", "Gate-All-Around", "GAAFET", "GAA FET", "gate all around", "nanosheet", "nanosheets"]
context = "Gate-All-Around (GAA) transistors wrap the gate completely around the channel (using nanosheets or nanowires), providing better electrostatic control than FinFET's three-sided gate. Samsung introduced GAA at 3nm in 2022, and Intel plans GAA (RibbonFET) for its 20A node."
id = "8d524ef2-513a-4a35-a4c4-5143c29f9eb2"

