# Day 4 Quiz: Moore's Law — The 60-Year Bet That Built the Modern World

## New Questions (6)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why did Moore's Law persist for six decades, despite not being a law of physics?"
prompt.distractors = [
    "Silicon's crystal lattice has a natural fractal property that inherently favors smaller geometries at each growth cycle",
    "Government funding programs like DARPA mandated specific transistor density targets that all manufacturers were legally required to hit",
    "Photolithography wavelengths decrease at a fixed physical rate over time, automatically enabling smaller features every two years"
]
answer.answer = "The semiconductor industry organized around it as a shared target, coordinating R&D roadmaps across equipment makers, foundries, and designers"
context = "The ITRS roadmap (1999-2015) codified expected progress. ASML, TSMC, Intel, materials suppliers, and EDA companies all synchronized their development timelines to hit the same density targets, making Moore's Law a self-fulfilling coordination mechanism rather than a natural phenomenon."
id = "d4-q1-why-persisted"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What fundamentally caused Dennard scaling to break down at the 90nm node and below?"
prompt.distractors = [
    "Copper interconnects at 90nm hit their resistivity limit, causing signal propagation delays that prevented higher clock frequencies",
    "The transition from aluminum to copper metallization introduced electromigration failures that limited the maximum current density",
    "Silicon's thermal conductivity drops sharply below 100nm feature sizes, making it impossible to extract heat fast enough for higher clocks"
]
answer.answer = "Gate oxides became so thin (a few atoms) that electrons tunneled through them quantum-mechanically, causing unmanageable leakage current even when transistors were off"
context = "Dennard scaling predicted constant power density as transistors shrank. But below ~90nm, quantum tunneling through ultra-thin gate oxides created significant leakage current, breaking the relationship between smaller transistors and lower power per switch. This 'power wall' forced the pivot to multicore designs."
id = "d4-q2-dennard-breakdown"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Approximately how much does it cost to design a chip at the 5nm process node, according to IBS estimates?"
prompt.distractors = [
    "Roughly $150 million, driven mainly by the cost of EUV mask sets and silicon validation runs at TSMC or Samsung foundries",
    "Roughly $50 million, since most design costs are offset by reusable IP blocks licensed from ARM and Synopsys design libraries",
    "Roughly $1.2 billion, with the majority spent on constructing dedicated test fabs to validate the design before full production"
]
answer.answer = "Roughly $542 million, reflecting the enormous complexity of verification, physical design, and multi-patterning-aware layout at leading-edge nodes"
context = "IBS estimated 5nm design costs at $542M, up from $28.5M at 65nm. This astronomical cost is why only a handful of companies (Apple, Qualcomm, Nvidia, AMD) can afford leading-edge designs. At 3nm, costs are projected to exceed $700M."
id = "d4-q3-design-cost"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What innovation did Intel introduce at the 45nm node in 2007 to address gate oxide leakage?"
prompt.distractors = [
    "They replaced the polysilicon gate electrode with a tungsten metal gate, reducing gate resistance and switching delay significantly",
    "They introduced strained silicon channels using silicon-germanium source/drain regions to boost carrier mobility without changing materials",
    "They switched from bulk silicon wafers to silicon-on-insulator (SOI) substrates to electrically isolate transistors from the substrate"
]
answer.answer = "They replaced silicon dioxide gate insulator with hafnium-based high-k dielectrics, which could be physically thicker while remaining electrically thin"
context = "Below ~1.2nm thickness, SiO2 gate oxides suffered catastrophic quantum tunneling leakage. High-k dielectrics like hafnium oxide have a higher dielectric constant, allowing a physically thicker layer (reducing tunneling) while maintaining the same capacitance (electrical thinness) needed for transistor control."
id = "d4-q4-highk"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why does the lesson argue that Moore's Law's ultimate limit might be economic rather than physical?"
prompt.distractors = [
    "The cost of raw silicon is increasing rapidly due to sand shortages, making wafer substrates prohibitively expensive below 3nm",
    "Patent licensing fees for sub-3nm transistor architectures are held by a single company, creating an artificial monopoly price barrier",
    "EUV light source costs scale quadratically with resolution, meaning each halving of feature size quadruples the scanner price"
]
answer.answer = "Fabs cost $20-40 billion, designs cost $500-800 million, and wafers cost $20,000+, so fewer customers and companies can justify leading-edge investment"
context = "Physics allows transistors to shrink further (down to ~1-2nm gate length), but the economic barriers are already biting. Only applications valuable enough — AI accelerators, smartphone SoCs for a billion devices, high-margin data center chips — can justify these costs, limiting who participates."
id = "d4-q5-economic-wall"

[[questions]]
type = "ShortAnswer"
prompt.prompt = "In what year did Gordon Moore originally publish his observation about transistor density doubling?"
answer.answer = "1965"
answer.alternatives = ["1965"]
context = "Gordon Moore published his observation in a 1965 article for Electronics magazine, when chips had about 50 transistors. He predicted the number of components per chip would double every year, later revised to every two years in 1975."
id = "d4-q6-year"

## Review Questions — Recent (Days 2-3)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "In the Czochralski crystal growth process, why is the seed crystal pulled upward while rotating, rather than simply dipped and held stationary?"
prompt.distractors = [
    "Rotation generates centrifugal force that ejects impurities to the melt surface, where they are skimmed off by an inert gas flow",
    "Upward pulling creates a pressure gradient that forces dissolved oxygen out of the crystal lattice before it can be incorporated",
    "The combination of pulling and rotation generates a magnetic field through the Seebeck effect that aligns the crystal domains"
]
answer.answer = "Rotation ensures uniform thermal distribution and pulling controls the solidification rate, together producing a single crystal with consistent diameter and minimal defects"
context = "The Czochralski process pulls the seed at about 1mm/min while rotating at ~10 RPM. Rotation distributes heat evenly around the crystal circumference, and the pull rate controls how quickly the melt solidifies, both critical for maintaining a single-crystal structure with uniform diameter."
id = "d4-q7-review-cz"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is the purpose of the pellicle membrane on a photolithography mask?"
prompt.distractors = [
    "It filters specific wavelengths from the light source to sharpen the aerial image projected through the mask features",
    "It provides a thin sacrificial layer that absorbs stray reflected light from the wafer surface during exposure",
    "It applies uniform mechanical pressure to keep the mask perfectly flat against the scanner's mask stage during scanning"
]
answer.answer = "It holds dust particles away from the mask's focal plane so they appear as blurred shadows rather than sharp printed defects on the wafer"
context = "The pellicle is a thin transparent membrane stretched across a frame a few millimeters above the mask surface. Any particles landing on the pellicle are far enough from the focal plane that they don't print as sharp defects — they're so out of focus they become invisible or negligible."
id = "d4-q8-review-pellicle"

## Review Questions — Older (Day 1)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why does a MOSFET use a thin insulating oxide layer between the gate electrode and the silicon channel?"
prompt.distractors = [
    "The oxide acts as a heat sink that absorbs thermal energy from switching, preventing the gate metal from melting at high frequencies",
    "The oxide creates a quantum tunneling barrier that allows only electrons with specific energy levels to pass, enabling selective switching",
    "The oxide prevents electromigration of metal atoms from the gate into the channel, which would permanently short the transistor"
]
answer.answer = "The oxide allows the gate's electric field to control the channel electrostatically without any current flowing into the gate, enabling near-zero power input for switching"
context = "The MOS (Metal-Oxide-Semiconductor) structure uses the oxide as an insulator so the gate operates purely through its electric field. This means the gate draws virtually no DC current, giving MOSFETs their enormous power efficiency advantage over bipolar transistors."
id = "d4-q9-review-mosfet-oxide"

[[questions]]
type = "ShortAnswer"
prompt.prompt = "What type of transistor architecture wraps the gate around three sides of a vertical silicon fin for better electrostatic control?"
answer.answer = "FinFET"
answer.alternatives = ["Fin-FET", "fin FET", "finfet"]
context = "FinFET (Fin Field-Effect Transistor) was introduced by Intel at the 22nm node in 2011. It replaced the traditional planar transistor by using a thin vertical 'fin' of silicon wrapped on three sides by the gate, dramatically improving electrostatic control and reducing leakage."
id = "d4-q10-review-finfet"
