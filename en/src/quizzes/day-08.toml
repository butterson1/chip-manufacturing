# Day 8 Quiz: EUV Lithography
# 6 new + 2 recent review (Days 5-7) + 2 older review (Days 1-4)

## --- NEW: Day 8 ---

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why can't EUV lithography systems use refractive lenses like DUV systems do?"
prompt.distractors = [
    "Because 13.5nm photons have insufficient energy to pass through quartz without causing radiation damage to the lens material over time",
    "Because the refractive index of glass at 13.5nm is too high, causing excessive chromatic aberration that blurs the projected image",
    "Because manufacturing lenses with the required sub-nanometer surface quality is impossible using current polishing technology"
]
answer.answer = "Because virtually all materials absorb 13.5nm light, making transmission through any lens material physically impossible at usable intensities"
context = "At 13.5nm wavelength, photons are energetic enough to be absorbed by essentially every solid material, including quartz and glass. This is why EUV systems use reflective mirrors (with Mo/Si multilayer coatings) instead of lenses, and must operate in near-perfect vacuum since even air absorbs EUV."
id = "d8-q01"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is the approximate conversion efficiency from CO₂ laser power to usable 13.5nm EUV photons at the source?"
prompt.distractors = [
    "15-20%, because the molybdenum-silicon collector mirror efficiently focuses the broadband tin plasma emission into a narrow EUV band",
    "0.5-1%, because most of the laser energy is reflected by the tin droplet surface before plasma formation can begin",
    "25-30%, because the pre-pulse flattening step maximizes the tin target's cross-section for optimal energy absorption"
]
answer.answer = "5-6%, because the tin plasma radiates across a broad spectrum and only a small fraction of emission falls within the usable 13.5nm band"
context = "The conversion efficiency from the 25kW CO₂ laser to usable 13.5nm EUV light is only about 5-6%. The tin plasma created at ~500,000°C emits across a wide spectrum, and only a small portion is at the desired 13.5nm wavelength. This is why source power has been such a critical challenge — most energy becomes heat, debris, and out-of-band radiation."
id = "d8-q02"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Each EUV mirror reflects about 67% of incoming light. With six mirrors in the projection optics, what fraction of EUV light reaches the wafer from the projection optics alone?"
prompt.distractors = [
    "Approximately 33%, since each mirror absorbs a constant absolute amount of photon energy rather than a fixed percentage",
    "Approximately 2%, accounting for both projection optics losses and additional absorption in the vacuum chamber residual gas",
    "Approximately 25%, because the multilayer Bragg reflectors recover some lost photons through secondary fluorescence effects"
]
answer.answer = "Approximately 9%, calculated as 0.67 raised to the sixth power, with additional losses from illumination optics reducing total transmission to 2-4%"
context = "Six mirrors at 67% reflectivity each give 0.67⁶ ≈ 9% transmission through the projection optics alone. When you add illumination optics and mask losses, total optical transmission from source to wafer drops to roughly 2-4%. This extreme light loss is why EUV source power is so critical."
id = "d8-q03"

[[questions]]
type = "ShortAnswer"
prompt.prompt = "Which German company is ASML's exclusive supplier of EUV mirror optics, manufacturing surfaces with sub-atomic roughness?"
answer.answer = "Zeiss"
answer.alternatives = ["Carl Zeiss", "Carl Zeiss SMT", "Zeiss SMT"]
context = "Carl Zeiss SMT in Oberkochen, Germany manufactures the EUV mirrors with RMS surface roughness below 0.05 nanometers — about a quarter of a silicon atom's diameter. Each projection optics mirror set takes months to produce and costs an estimated $50-100 million."
id = "d8-q04"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why does the High-NA EXE system use anamorphic optics with different magnification ratios (4× and 8×) in X and Y?"
prompt.distractors = [
    "To correct for the astigmatism introduced by the off-axis illumination angle required by the reflective EUV mask geometry",
    "To double the throughput by exposing two adjacent die simultaneously through a split-beam optical configuration",
    "To reduce chromatic aberration by spreading different EUV wavelengths across perpendicular axes of the imaging field"
]
answer.answer = "To increase numerical aperture to 0.55 while keeping mirror sizes manufacturable, accepting a halved field size in one direction as a tradeoff"
context = "Increasing NA from 0.33 to 0.55 would require impractically large mirrors with uniform magnification. Anamorphic optics (4× in one axis, 8× in the other) keep mirror dimensions feasible at the cost of halving the exposure field in one direction. This engineering compromise lets High-NA achieve ~8nm half-pitch resolution."
id = "d8-q05"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "How does ASML manage the tin debris created by vaporizing 50,000 droplets per second inside the EUV source chamber?"
prompt.distractors = [
    "Electrostatic precipitator plates surrounding the chamber attract ionized tin particles, which are scraped off during weekly maintenance",
    "A cryogenic cold trap at -200°C near the chamber walls condenses tin vapor into solid deposits that are periodically vacuum-extracted",
    "Rotating sacrificial foil traps placed between the plasma and collector mirror physically intercept tin fragments and are replaced every 72 hours"
]
answer.answer = "Hydrogen gas flow reacts with tin to form volatile stannane (SnH₄) that is pumped away, combined with magnetic debris mitigation and periodic in-situ cleaning"
context = "Tin debris management is critical to protecting the expensive collector mirror. The primary method uses hydrogen gas, which reacts with deposited tin to form stannane (SnH₄), a volatile compound that can be pumped out. This is supplemented by magnetic fields that deflect charged tin ions and periodic cleaning cycles."
id = "d8-q06"

## --- RECENT REVIEW: Days 5-7 ---

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why is NAND considered a 'universal gate' in digital logic design?"
prompt.distractors = [
    "Because NAND gates consume less power than other gate types, making them the most efficient choice for battery-powered CMOS circuits",
    "Because NAND gates have the fastest propagation delay of any logic gate, enabling higher clock frequencies in processor pipelines",
    "Because NAND gates use fewer transistors than any other gate type, requiring only two transistors per gate in CMOS implementation"
]
answer.answer = "Because any Boolean function can be implemented using only NAND gates, including AND, OR, NOT, and all combinations thereof"
context = "NAND (and NOR) are 'functionally complete' — any Boolean logic function can be built from NAND gates alone. This was proven by Charles Sanders Peirce in 1880 and Henry Sheffer in 1913. In practice, CMOS NAND gates use 4 transistors and are slightly preferred over NOR gates because PMOS transistors are slower and NOR gates stack them in series."
id = "d8-q07"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "In a modern leading-edge fab, how does the automated material handling system (AMHS) transport wafers between process tools?"
prompt.distractors = [
    "Autonomous ground vehicles (AGVs) carry FOUPs along magnetic-strip guided floor paths at speeds up to 3 m/s between tool bays",
    "Pressurized nitrogen pipelines transport individual wafers sealed in protective capsules through underground tunnels below the cleanroom",
    "Human operators in bunny suits carry FOUPs between nearby tools, with robotic handoffs used only for inter-building transfers"
]
answer.answer = "Overhead hoist transport (OHT) vehicles carry FOUPs along ceiling-mounted rail networks spanning the entire cleanroom at roughly 7-8 m/s"
context = "Modern fabs use overhead hoist transport (OHT) vehicles running on ceiling-mounted rail networks. FOUPs (Front Opening Unified Pods) — sealed containers holding up to 25 wafers — are moved automatically between tools. The AMHS in a large fab manages thousands of FOUP moves per hour across 15-30 km of total wafer travel distance per wafer."
id = "d8-q08"

## --- OLDER REVIEW: Days 1-4 ---

[[questions]]
type = "ShortAnswer"
prompt.prompt = "What is the name of the crystal growth technique used to produce the cylindrical single-crystal silicon ingots from which wafers are sliced?"
answer.answer = "Czochralski"
answer.alternatives = ["Czochralski method", "Czochralski process", "CZ", "CZ method"]
context = "The Czochralski (CZ) process, invented by Jan Czochralski in 1916, involves dipping a seed crystal into molten silicon at ~1,414°C and slowly pulling it upward while rotating. The silicon solidifies onto the seed, growing into a cylindrical ingot up to 2 meters long and 300mm in diameter. Over 95% of semiconductor wafers are produced this way."
id = "d8-q09"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why did the relationship between transistor density and naming break down at around the 130nm process node?"
prompt.distractors = [
    "Because the transition from aluminum to copper interconnects at 130nm changed the critical dimension that defined each node's capabilities",
    "Because International Technology Roadmap for Semiconductors (ITRS) shifted from measuring gate length to measuring interconnect pitch at that generation",
    "Because the introduction of strained silicon at 130nm improved performance enough that physical shrinking became less important for marketing purposes"
]
answer.answer = "Because foundries began optimizing different features (gate pitch, metal pitch, fin pitch) at different rates, making a single measurement meaningless as a node label"
context = "Before ~130nm, the node name roughly matched the physical gate length. After that, different manufacturers optimized different dimensions at different rates — Intel might shrink gate pitch aggressively while TSMC focused on metal pitch. A single number could no longer capture the multi-dimensional reality of a process, so node names became marketing labels rather than measurements."
id = "d8-q10"
