# Day 10 Quiz: Doping & Ion Implantation
# 6 new + 2 recent review (Days 8-9) + 2 older review (Days 1-6)

## --- NEW: Day 10 ---

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why does replacing one in every million silicon atoms with phosphorus increase free carrier concentration by roughly three million times?"
prompt.distractors = [
    "Because phosphorus atoms disrupt the lattice periodicity, breaking bonds across a wide region and liberating electrons from neighboring silicon atoms",
    "Because phosphorus has a much lower ionization energy than silicon, so it spontaneously releases all five valence electrons at room temperature",
    "Because the phosphorus-silicon bond is metallic rather than covalent, creating a conduction band that overlaps with the valence band locally"
]
answer.answer = "Because intrinsic silicon has extremely few carriers (~10¹⁰/cm³), so adding ~5×10¹⁶ donors/cm³ overwhelms the baseline by a factor of millions"
context = "Intrinsic silicon at room temperature has only ~1.5×10¹⁰ carriers/cm³ out of ~5×10²² atoms/cm³. Even a tiny dopant fraction (one per million, ~5×10¹⁶/cm³) is millions of times larger than the intrinsic count."
id = "d10-q01"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is the key advantage of ion implantation over thermal diffusion for doping?"
prompt.distractors = [
    "Ion implantation operates at higher temperatures than diffusion, allowing dopants to reach substitutional sites without requiring a separate anneal step",
    "Ion implantation avoids introducing any crystal damage, so the dopant atoms are immediately electrically active upon entering the lattice",
    "Ion implantation uses neutral atoms instead of ions, eliminating charge-induced surface damage that diffusion furnaces create from ionized gas"
]
answer.answer = "Ion implantation allows independent control of dopant depth (via energy) and dopant concentration (via dose), unlike diffusion where depth and dose are coupled"
context = "In thermal diffusion, temperature and time jointly determine both depth and concentration. Ion implantation decouples these: acceleration voltage sets the depth (projected range) while beam current × time sets the dose."
id = "d10-q02"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why are dopant atoms NOT electrically active immediately after ion implantation?"
prompt.distractors = [
    "Because the wafer surface oxidizes during implantation, forming an insulating barrier that traps dopant atoms in an electrically inert oxide compound",
    "Because the implanter operates in vacuum, so dopant atoms remain ionized and cannot bond with silicon until atmospheric pressure is restored",
    "Because the beam scanning pattern creates standing-wave interference in the lattice, placing dopant atoms at nodal points with zero electron density"
]
answer.answer = "Because the implanted ions land in random interstitial positions amid heavy crystal damage, not in the substitutional lattice sites needed for electrical activity"
context = "Each implanted ion displaces ~2000 silicon atoms, creating a damaged zone. Dopants sitting between lattice sites (interstitially) don't contribute carriers. Annealing repairs the crystal and moves dopants into substitutional sites."
id = "d10-q03"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why is arsenic preferred over phosphorus for shallow, heavily doped NMOS source/drain regions?"
prompt.distractors = [
    "Because arsenic has a higher solid solubility in silicon than phosphorus, enabling greater peak concentrations before clustering or precipitation occurs",
    "Because arsenic ions are lighter and can be accelerated to lower energies more easily, producing shallower implant profiles with less energy spread",
    "Because arsenic creates fewer Frenkel pairs per implanted ion than phosphorus, resulting in less crystal damage and easier subsequent annealing"
]
answer.answer = "Because arsenic is much heavier (mass 75 vs. 31), so it diffuses roughly 10× slower than phosphorus, keeping the junction shallow through subsequent thermal steps"
context = "Arsenic's high atomic mass gives it very low diffusivity in silicon. Once implanted, it stays put during annealing and later thermal steps, whereas lighter phosphorus would spread and deepen the junction."
id = "d10-q04"

[[questions]]
type = "ShortAnswer"
prompt.prompt = "What is the name for the phenomenon where implanted ions travel much deeper than expected by following open rows in the silicon crystal lattice?"
answer.answer = "channeling"
answer.alternatives = ["ion channeling", "crystal channeling"]
context = "When the ion beam aligns with a major crystal axis (like <110>), ions can travel down the open channels between atomic rows, penetrating far deeper than random stopping theory predicts. Fabs counter this by tilting wafers ~7° and using pre-amorphization implants."
id = "d10-q05"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why has the industry moved toward undoped channels in FinFETs and nanosheet transistors?"
prompt.distractors = [
    "Because undoped channels allow higher operating voltages, which compensates for the reduced gate capacitance in multi-gate transistor architectures",
    "Because removing channel dopants eliminates the need for ion implantation entirely, significantly reducing the number of process steps and overall fab cost",
    "Because undoped silicon has inherently higher electron mobility than doped silicon at any temperature, making undoped channels universally faster"
]
answer.answer = "Because channels are now so small that they contain only one or two dopant atoms, making random dopant fluctuation a dominant source of transistor-to-transistor variability"
context = "A nanosheet channel at the 2nm node might have a volume of ~1250 nm³. At 10¹⁸/cm³ doping, that's ~1.25 dopant atoms. The difference between 1 and 2 atoms causes ~80% threshold voltage variation, so work function metals are used instead."
id = "d10-q06"

## --- REVIEW: Recent (Days 8-9) ---

[[questions]]
type = "MultipleChoice"
prompt.prompt = "In ASML's EUV scanner, why must the entire optical path use reflective mirrors rather than refractive lenses?"
prompt.distractors = [
    "Because refractive lenses would introduce chromatic aberration at all wavelengths below 248nm, making it impossible to achieve the required overlay accuracy",
    "Because EUV light travels as a particle beam rather than a wave, so refraction does not occur and only specular reflection can redirect the photons",
    "Because refractive lenses would expand the beam cross-section beyond the slit width, reducing the effective numerical aperture below usable levels"
]
answer.answer = "Because 13.5nm EUV light is absorbed by virtually all solid materials, so no transparent lens material exists and reflective Mo/Si multilayer mirrors are the only viable option"
context = "At 13.5nm wavelength, even materials like fused silica (transparent at DUV) are completely opaque. EUV systems use Bragg-reflector mirrors made of ~40-80 alternating Mo/Si bilayers, each only ~6.9nm thick."
id = "d10-q07"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "In ALD (atomic layer deposition), what mechanism limits film growth to exactly one atomic layer per cycle?"
prompt.distractors = [
    "The precursor gas pressure is calibrated so precisely that exactly one monolayer of molecules enters the chamber before the supply valve automatically closes",
    "The substrate temperature is set at the exact decomposition point of the precursor, so only the first arriving molecules have enough energy to bond before cooling",
    "The plasma step between precursor pulses removes all but the bottom-most layer of adsorbed molecules through selective ion bombardment at controlled bias"
]
answer.answer = "Each precursor reacts only with specific surface functional groups and stops once all available sites are occupied, making the process inherently self-limiting"
context = "ALD relies on self-limiting surface chemistry. Precursor A saturates all reactive sites, excess is purged, then precursor B reacts with the adsorbed A layer and re-terminates the surface. Growth per cycle is typically 0.5-1.5 Å regardless of exposure time."
id = "d10-q08"

## --- REVIEW: Older (Days 1-6) ---

[[questions]]
type = "ShortAnswer"
prompt.prompt = "What crystal growth method is used to produce the single-crystal silicon ingots from which semiconductor wafers are sliced?"
answer.answer = "Czochralski"
answer.alternatives = ["CZ", "Czochralski method", "Czochralski process"]
context = "The Czochralski (CZ) process involves dipping a seed crystal into molten silicon at ~1414°C and slowly pulling it upward while rotating, growing a single-crystal ingot up to 300mm in diameter and 2 meters long."
id = "d10-q09"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why did the relationship between process node names and actual transistor dimensions break down around 130nm?"
prompt.distractors = [
    "Because wafer sizes increased from 200mm to 300mm at that node, requiring new naming conventions based on wafer diameter rather than feature size",
    "Because the transition from aluminum to copper interconnects changed which feature was considered the defining measurement for each technology generation",
    "Because EUV lithography was first introduced at 130nm, and its superior resolution made traditional gate-length-based naming seem artificially conservative"
]
answer.answer = "Because foundries began marketing smaller node numbers for competitive advantage while actual gate lengths, metal pitch, and density did not shrink at the same rate"
context = "After ~130nm, the node name became a marketing label rather than a physical measurement. TSMC's '7nm' has a minimum metal pitch of ~36nm and fin pitch of ~30nm — nowhere near 7nm for any real feature."
id = "d10-q10"
