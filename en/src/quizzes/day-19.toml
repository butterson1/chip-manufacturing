[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is the core computational operation that dominates neural network workloads in AI accelerators?"
prompt.distractors = [
    "Bitwise XOR operations on sparse feature maps with conditional branching",
    "Fast Fourier transforms applied to weight tensors during backpropagation",
    "Hash table lookups for embedding vectors stored in high-bandwidth memory",
]
answer.answer = "Multiply-accumulate operations on matrix elements with running sums"
context = "Neural network layers are fundamentally matrix multiplications: multiply two numbers and add the result to a running sum. This multiply-accumulate (MAC) operation accounts for the overwhelming majority of compute in both training and inference."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What architectural innovation is at the heart of Google's TPU v1?"
prompt.distractors = [
    "A crossbar switch connecting 65,536 independent processing cores to shared HBM",
    "A reconfigurable FPGA fabric that adapts its datapath to each neural network layer",
    "A VLIW processor with 256 parallel execution units and a software-managed scratchpad",
]
answer.answer = "A 256×256 systolic array where data pulses rhythmically between neighboring MACs"
context = "The TPU v1's systolic array passes data between neighboring processing elements without central memory access, performing 65,536 MACs per cycle at 700 MHz. The name 'systolic' comes from the rhythmic, heart-like flow of data through the grid."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why did Google design bfloat16 with an 8-bit exponent and only 7-bit mantissa, rather than using IEEE FP16's 5-bit exponent and 10-bit mantissa?"
prompt.distractors = [
    "FP16's wider mantissa causes excessive silicon area usage in tensor core multipliers",
    "IEEE FP16's exponent range is too wide, leading to wasted bits on values neural networks never produce",
    "BF16's narrower mantissa enables error-correcting codes that prevent silent data corruption during training",
]
answer.answer = "Neural networks need wide dynamic range to avoid overflow/underflow but tolerate imprecise mantissa values"
context = "Google Brain's insight was that neural networks care more about dynamic range (not overflowing or underflowing) than exact decimal precision. BF16 keeps FP32's exponent range while reducing mantissa bits, making mixed-precision training practical."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What alarming projection drove Google to develop the TPU in 2013?"
prompt.distractors = [
    "Projected YouTube recommendation latency would exceed 500ms without dedicated inference hardware",
    "Gmail's spam classification models were consuming 40% of all Google CPU capacity worldwide",
    "Google Translate's neural machine translation models required 10× more FLOPs than available GPU capacity",
]
answer.answer = "Three minutes daily of voice search per Android user would require doubling Google's entire compute capacity"
context = "In 2013, Google calculated that if every Android user used voice search for just three minutes per day, they'd need to double their entire data center compute capacity for speech recognition neural networks. This made custom silicon economically necessary."

[[questions]]
type = "ShortAnswer"
prompt.prompt = "What is the term for the ratio of compute operations to memory bytes accessed that determines whether an AI workload is compute-bound or memory-bound?"
answer.answer = "arithmetic intensity"
answer.alternatives = ["compute intensity", "operational intensity"]
context = "Arithmetic intensity (FLOPs per byte of data accessed) determines whether a workload is limited by processing speed (compute-bound, high arithmetic intensity) or data delivery (memory-bound, low arithmetic intensity). Large matrix multiplications have high arithmetic intensity (~1000 FLOPs/byte) while autoregressive decoding is severely memory-bound."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "During autoregressive LLM inference with a 175B-parameter model at FP16, why do tensor cores sit idle approximately 95% of the time?"
prompt.distractors = [
    "The softmax attention operation cannot be parallelized and serializes all tensor core warps",
    "Pipeline bubbles between transformer layers create synchronization stalls that dominate runtime",
    "The KV-cache memory allocation overhead forces frequent garbage collection pauses on the GPU",
]
answer.answer = "Each token requires reading ~350 GB of weights from HBM, and bandwidth limits throughput to ~9.5 tokens/sec"
context = "Generating each token requires a full forward pass that reads the entire model weight matrix. At 175B params × 2 bytes (FP16) = 350 GB per token, even 3.35 TB/s HBM3 bandwidth yields only ~9.5 tokens/second. The compute units starve waiting for data."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What key advantage does Cerebras' Wafer-Scale Engine (WSE-3) architecture have over conventional GPU-based AI accelerators?"
prompt.distractors = [
    "Its optical interconnects between processing cores achieve 10× lower latency than NVLink",
    "Its 46,225 mm² die can be manufactured at higher yield than conventional chips using EUV self-repair",
    "Its deterministic dataflow scheduling eliminates all memory access conflicts across 900K cores",
]
answer.answer = "Its 44 GB of on-chip SRAM eliminates the HBM memory bandwidth bottleneck entirely"
context = "The WSE-3 contains 44 GB of on-chip SRAM distributed across 900,000 cores, keeping data close to compute and avoiding the HBM bandwidth wall that limits conventional GPU architectures. This is a radical approach to the memory-bound nature of many AI workloads."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What makes NVIDIA's CUDA ecosystem a more durable competitive advantage than hardware specifications alone?"
prompt.distractors = [
    "CUDA's proprietary compiler generates code that runs 3-5× faster than any open-source alternative on identical hardware",
    "NVIDIA's patent portfolio on tensor core microarchitecture prevents competitors from matching their peak TFLOPS",
    "CUDA's exclusive access to HBM3E memory controllers gives NVIDIA GPUs higher effective bandwidth than AMD",
]
answer.answer = "18 years of optimized libraries, frameworks, and tools let researchers achieve 80-90% hardware utilization with standard code"
context = "CUDA's libraries (cuBLAS, cuDNN, NCCL, TensorRT) represent millions of person-hours of optimization. Researchers write standard PyTorch and get 80-90% of peak utilization — achieving the same on competing platforms requires months of manual tuning, making the software ecosystem stickier than any hardware spec."

[[questions]]
type = "ShortAnswer"
prompt.prompt = "What algorithmic optimization, developed by Tri Dao, restructures transformer attention computation to maximize SRAM data reuse and delivered 2-4× speedup without hardware changes?"
answer.answer = "Flash Attention"
answer.alternatives = ["FlashAttention", "flash attention", "Flash-Attention"]
context = "Flash Attention restructures the attention computation to process data in tiles that fit in GPU SRAM, minimizing expensive HBM reads/writes. This purely algorithmic optimization delivered 2-4× speedup by addressing the memory-bound nature of attention — proving that software efficiency can rival hardware upgrades."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What model FLOPs utilization (MFU) did Meta report when training Llama 3 405B on 16,384 H100 GPUs?"
prompt.distractors = [
    "Approximately 65-72%, with pipeline parallelism overhead as the primary efficiency loss",
    "Approximately 15-22%, with NVLink bandwidth saturation limiting multi-node scaling efficiency",
    "Approximately 75-82%, achieved by custom NCCL modifications that overlapped compute and communication",
]
answer.answer = "Approximately 38-43%, with communication overhead and load imbalance consuming most potential compute"
context = "Meta reported 38-43% MFU for Llama 3 405B training, meaning over half of the H100 fleet's theoretical compute was lost to collective communication, pipeline bubbles, memory fragmentation, and load imbalance. This illustrates why software efficiency improvements can be worth more than hardware upgrades."
