[[questions]]
type = "MultipleChoice"
prompt.prompt = "What was the key insight of Dennard scaling (1974)?"
prompt.distractors = [
    "Transistor switching speed doubles every two years as lithographic resolution improves and channel lengths shrink proportionally",
    "Total chip power consumption increases linearly with transistor count because each additional transistor adds a fixed energy overhead",
    "Manufacturing cost per transistor decreases exponentially with each process node because wafer costs remain relatively constant"
]
answer.answer = "As transistors shrink, voltage and current scale down proportionally so that power density remains roughly constant across generations"
context = "Dennard scaling observed that shrinking transistor dimensions by κ allows voltage to drop by κ, keeping power per unit area constant — enabling more transistors at higher frequency without increasing total power."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why did Intel cancel the 4 GHz Prescott Pentium 4 in 2004?"
prompt.distractors = [
    "The 90nm manufacturing process had insufficient yield rates for the large die size, making the 4 GHz SKU commercially unviable at scale",
    "AMD's Athlon 64 delivered superior IPC at lower frequencies, making the 4 GHz target strategically irrelevant for market positioning",
    "The 31-stage pipeline caused excessive branch misprediction penalties that negated the performance gains from the higher clock frequency"
]
answer.answer = "Leakage power at 90nm consumed ~40% of total power, pushing thermal density beyond what any practical cooling solution could handle"
context = "Prescott hit ~115W TDP with thermal density approaching 100 W/cm² in hotspots. Subthreshold leakage and gate oxide tunneling at 90nm made the 4 GHz target thermally impossible."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What causes the subthreshold leakage floor that prevents indefinite voltage scaling?"
prompt.distractors = [
    "Electromigration of copper atoms in the power delivery network creates resistance increases that limit minimum operational voltage thresholds",
    "Gate oxide capacitance saturates at atomic thicknesses, preventing the gate from developing sufficient electric field to modulate the channel",
    "Interconnect RC delays between transistors increase at lower voltages because reduced signal swing approaches the metal wire noise floor"
]
answer.answer = "Quantum tunneling allows electrons to pass through the channel barrier even when the gate voltage is below threshold, with leakage rising ~10× per 100mV of V_th reduction"
context = "At threshold voltages around 200-300mV, subthreshold leakage becomes exponentially significant — electrons quantum-mechanically tunnel through the barrier, creating current even when the transistor is 'off.'"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "In the dynamic power equation P = α × C × V² × f, why is the voltage term the most important lever for power reduction?"
prompt.distractors = [
    "Voltage is the only variable that can be adjusted in real-time during chip operation, while capacitance and frequency are fixed at manufacturing time",
    "Voltage directly determines the maximum achievable clock frequency, so reducing voltage simultaneously reduces both the V and f terms in the equation",
    "Voltage reduction also decreases the activity factor α because transistors at lower voltage switch fewer times per clock cycle on average"
]
answer.answer = "Power scales with the square of voltage, so a 30% voltage reduction yields a 51% power savings — a nonlinear effect unmatched by any other single variable"
context = "The V² relationship means small voltage reductions produce outsized power savings. This is why Apple's cores running at 0.55-0.75V achieve comparable performance to older Intel cores at 1.2V+ while using dramatically less power."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why does leakage power create a positive thermal feedback loop that can lead to thermal runaway?"
prompt.distractors = [
    "Higher temperatures cause copper interconnects to expand, reducing their cross-section and increasing resistive power loss in the metal layers",
    "Dynamic power increases with temperature because carrier mobility changes alter the switching threshold, causing more transistors to toggle each cycle",
    "The thermal interface material between die and heatsink degrades at high temperatures, exponentially reducing heat transfer efficiency over time"
]
answer.answer = "Subthreshold leakage current roughly doubles with every 10°C temperature increase, generating additional heat that further raises temperature and leakage"
context = "This positive feedback loop is why server chips have hard thermal shutdown at 100-105°C — it's about breaking the leakage feedback loop before it becomes self-reinforcing and uncontrollable."

[[questions]]
type = "ShortAnswer"
prompt.prompt = "What fraction of total chip power on Intel's 90nm Prescott was wasted as leakage (transistors that were supposed to be off)?"
answer.answer = "40%"
answer.alternatives = ["40 percent", "~40%", "about 40%", "roughly 40%"]
context = "At the 90nm node, subthreshold leakage and gate oxide tunneling caused roughly 40% of Prescott's total power dissipation to come from transistors in their 'off' state."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is the 'dark silicon' problem, and why is it actually a design strategy?"
prompt.distractors = [
    "Transistors in the lowest metal layers receive no light during photolithography, requiring special exposure techniques that limit how densely they can be placed",
    "Silicon becomes opaque to infrared thermal imaging at high transistor densities, making it impossible to identify hotspots and requiring preventive power limits",
    "Defect-prone regions of the die are permanently disabled during manufacturing test, with redundant circuits mapped around them to maintain functionality"
]
answer.answer = "50-80% of transistors cannot be powered simultaneously without exceeding the thermal budget, so chips include more capability than they can use at once and activate blocks selectively"
context = "Dark silicon is an intentional overprovisioning strategy. Chips contain specialized accelerators (GPU, NPU, ISP, video encode) that are selectively powered based on workload, keeping total power within the thermal envelope."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "How does power gating differ from clock gating in managing idle circuit power?"
prompt.distractors = [
    "Clock gating uses high-V_th transistors to disconnect blocks from power, while power gating freezes the clock signal to prevent switching activity",
    "Power gating operates on individual transistors within a logic block, while clock gating acts only on entire processor cores as a single unit",
    "Clock gating eliminates both dynamic and leakage power but has longer wake-up latency, while power gating only saves dynamic power with instant recovery"
]
answer.answer = "Power gating physically disconnects idle blocks from supply rails via sleep transistors, eliminating leakage, while clock gating only stops switching to save dynamic power"
context = "Power gating eliminates both dynamic and leakage power but has 10-100µs wake-up latency. Clock gating is finer-grained and instant but only eliminates dynamic power — leakage continues in clock-gated circuits."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why does backside power delivery (Intel PowerVia, TSMC BSPDN) help reduce chip power consumption?"
prompt.distractors = [
    "Moving power rails to the back of the wafer eliminates the need for on-die voltage regulators, removing their 10-15% efficiency penalty entirely",
    "Backside power delivery allows thicker metal layers for signal routing on the front side, reducing signal repeater power by shortening critical path delays",
    "Separating power and signal routing enables higher clock frequencies because electromagnetic coupling between power and signal lines is eliminated"
]
answer.answer = "Separating power delivery from signal routing reduces IR drop across the power network by 30-50%, allowing lower nominal voltage for the same effective voltage at transistors"
context = "IR drop — the voltage loss across the power distribution network — forces designers to set nominal voltage higher than necessary. By reducing IR drop 30-50%, backside power delivery lets chips run at lower voltage, directly cutting V²f dynamic power."

[[questions]]
type = "ShortAnswer"
prompt.prompt = "What is the approximate power range ratio that Apple's M-series performance cores can operate across, from minimum to maximum frequency?"
answer.answer = "100:1"
answer.alternatives = ["100 to 1", "100x", "~100:1"]
context = "Apple's P-cores can operate from ~600 MHz at ~0.5V (under 50mW) to ~3.78 GHz at ~1.1V (several watts), achieving roughly a 100:1 power range through aggressive per-core DVFS."
