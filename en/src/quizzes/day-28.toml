[[questions]]
type = "MultipleChoice"
prompt.prompt = "What fundamental limitation of FinFET transistors does the Gate-All-Around (GAA) architecture specifically address?"
prompt.distractors = [
  "The gate oxide thickness cannot be reduced below 1.2 nm due to quantum tunneling through the dielectric",
  "The source-drain distance cannot shrink further because of lithographic resolution limits at sub-3nm pitch",
  "The fin height-to-width aspect ratio becomes mechanically unstable when fins exceed 8:1 proportions"
]
answer.answer = "The gate only wraps three sides of the fin, leaving the bottom surface with weak electrostatic control at short gate lengths"
context = "In FinFETs, the gate contacts three sides of a vertical fin but the bottom is exposed, creating a region of poor electrostatic control. As gate lengths shrink below ~5nm, this becomes critical. GAA nanosheets wrap the gate around all four sides of each channel, providing complete electrostatic control."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "How many stacked nanosheets does TSMC's N2 GAA process use, and approximately how thick is each sheet?"
prompt.distractors = [
  "Three stacked nanosheets, each roughly 8-10 nanometers thick with 15 nm vertical spacing between them",
  "Six stacked nanosheets, each roughly 2-3 nanometers thick with 6 nm vertical spacing between them",
  "Two stacked nanosheets, each roughly 10-12 nanometers thick with 20 nm vertical spacing between them"
]
answer.answer = "Four stacked nanosheets, each roughly 5-6 nanometers thick with adjustable width of 25-50 nanometers"
context = "TSMC's N2 process uses four stacked horizontal nanosheets, each approximately 5-6 nm thick and 25-50 nm wide. The ability to adjust sheet width — wider for high-performance, narrower for low-power — is a key advantage over FinFETs."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is CFET (Complementary FET) and why is it considered the next step beyond basic GAA?"
prompt.distractors = [
  "CFET uses compound semiconductor channels like InGaAs to boost electron mobility 5× beyond silicon nanosheets",
  "CFET adds a fifth nanosheet to the stack and uses asymmetric gate metals to improve switching speed by 40%",
  "CFET replaces the silicon channel entirely with carbon nanotube arrays for superior electrostatic control"
]
answer.answer = "CFET stacks NMOS and PMOS transistors vertically on top of each other, potentially shrinking standard cell height by 30-40%"
context = "CFET places NMOS and PMOS nanosheet devices directly above/below each other connected by internal vias, rather than side by side. Intel projects CFET in production around 2027-2028 at the 14A node. The major challenge is integrating two different transistor types in a vertical stack with different materials and doping."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "In backside power delivery networks (BSPDNs), how thin must the silicon substrate be thinned, and what performance benefit did Intel's PowerVia demonstrate?"
prompt.distractors = [
  "Thinned to approximately 10-20 µm, demonstrating a 15% reduction in leakage current and 3% area savings",
  "Thinned to approximately 50-100 µm, demonstrating a 20% improvement in thermal dissipation efficiency",
  "Thinned to approximately 5-10 µm, demonstrating a 12% reduction in capacitive coupling noise"
]
answer.answer = "Thinned to approximately 0.5-1 µm, demonstrating a 30% reduction in IR drop and 6% frequency improvement"
context = "BSPDNs require thinning the wafer from its original 775 µm down to just 0.5-1 µm — less than a red blood cell's width. Intel's PowerVia showed 30% lower IR drop and 6% frequency improvement by separating power (backside) and signal (front-side) routing."

[[questions]]
type = "ShortAnswer"
prompt.prompt = "What is the thickness of a monolayer of MoS₂ in nanometers?"
answer.answer = "0.65"
answer.alternatives = ["0.65 nm", "0.65nm", ".65"]
context = "A monolayer of molybdenum disulfide (MoS₂) is just 0.65 nanometers thick — three atoms arranged as sulfur-molybdenum-sulfur. This inherent 2D nature means thinning doesn't degrade its properties the way it does with silicon."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why is graphene unsuitable for digital logic transistors despite having ~100× the electron mobility of silicon?"
prompt.distractors = [
  "Graphene's hexagonal crystal structure is incompatible with standard CMOS fabrication on 300mm silicon wafers",
  "Graphene's extremely high thermal conductivity causes unwanted heat dissipation that reduces switching energy",
  "Graphene's single-atom thickness makes it mechanically fragile and unable to withstand CMP processing steps"
]
answer.answer = "Graphene has zero bandgap, meaning transistors made from it can never fully turn off to block current flow"
context = "Despite extraordinary electron mobility (~200,000 cm²/V·s), graphene has no bandgap. A transistor needs to fully switch between on and off states. Graphene transistors can modulate current but never completely block it — like a valve that can change flow rate but never fully close."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What percentage of total energy consumption in a modern AI data center is spent on moving data rather than computing?"
prompt.distractors = [
  "Approximately 15-25%, primarily due to DRAM refresh cycles and memory controller overhead power draw",
  "Approximately 70-85%, mainly because optical transceivers in rack switches dominate the power envelope",
  "Approximately 5-10%, since modern high-bandwidth memory stacks have largely solved data movement costs"
]
answer.answer = "Approximately 40-60%, driven by electrical signaling losses across chips, boards, racks, and buildings"
context = "In modern AI data centers, 40-60% of total energy goes to data movement — not computation. Electrical signaling in copper suffers frequency-dependent loss, especially at 112 Gbps+ rates. This is driving the push toward silicon photonics and optical interconnects."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is the key technical challenge that has prevented carbon nanotube transistors from scaling to billion-transistor chips?"
prompt.distractors = [
  "Carbon nanotubes have insufficient bandgap for room-temperature operation and require cryogenic cooling below 77K",
  "Carbon nanotube channels exhibit excessive gate leakage current that increases exponentially with temperature",
  "Carbon nanotubes cannot be doped with standard n-type and p-type dopants used in CMOS manufacturing"
]
answer.answer = "Roughly one-third of as-grown nanotubes are metallic (causing shorts), and precise placement at 5nm pitch remains unsolved"
context = "Carbon nanotube fabrication faces three interrelated challenges: chirality control (about 1/3 of tubes grow as metallic conductors rather than semiconductors, creating shorts), placement precision (tubes must align in parallel arrays at ~5nm pitch), and high contact resistance at metal-nanotube junctions."

[[questions]]
type = "ShortAnswer"
prompt.prompt = "What bump pitch does hybrid bonding achieve in current production, enabling near-on-die bandwidth density between chiplets? (answer in micrometers)"
answer.answer = "3-9"
answer.alternatives = ["3-9 µm", "3 to 9", "3-9 um", "3-9µm"]
context = "Hybrid bonding — direct copper-to-copper bonding without solder — achieves 3-9 µm pitch in production, compared to 40-50 µm for conventional 2.5D packaging. Research demonstrations have gone below 1 µm, approaching on-die interconnect densities."

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Intel's MESO (MagnetoElectric Spin-Orbit) logic devices aim to switch at what voltage, and how does this compare to conventional silicon?"
prompt.distractors = [
  "MESO targets switching at 500 mV, roughly matching silicon's current operating voltage but with zero standby leakage",
  "MESO targets switching at 50 mV, approaching the thermodynamic Landauer limit of energy per bit erasure",
  "MESO targets switching at 300 mV, approximately half of silicon's minimum voltage with 5× lower switching energy"
]
answer.answer = "MESO targets switching at 100 mV, roughly one-fifth of silicon's minimum voltage with 10-30× lower switching energy"
context = "Intel's MESO devices combine magnetoelectric and spin-orbit coupling to switch at ~100 mV — about one-fifth of silicon's practical minimum — with 10-30× lower switching energy per operation. Spintronic logic also offers zero standby power since spin states persist without power."
