<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <defs><style>
    .t{font: 18px Arial, sans-serif; fill:#dbe7ff}.s{font:14px Arial,sans-serif; fill:#9fb4d9}
    .box{fill:#101827;stroke:#6ea8fe;stroke-width:2}.oxide{fill:#9ad0f5}.gate{fill:#ffd166}.sd{fill:#ef476f}.sub{fill:#06d6a0}.arr{stroke:#ffd166;stroke-width:4;marker-end:url(#m)}
  </style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#ffd166"/></marker></defs>
  <rect width="900" height="420" fill="#0b1020"/>
  <text x="40" y="42" class="t">MOSFET as a controlled channel</text>
  <text x="40" y="68" class="s">Gate voltage creates or removes the conductive path between source and drain.</text>
  <rect x="110" y="270" width="680" height="70" rx="8" class="sub" opacity="0.3"/>
  <text x="415" y="315" class="t">Silicon body / substrate</text>
  <rect x="150" y="185" width="130" height="90" rx="8" class="sd" opacity="0.8"/>
  <rect x="620" y="185" width="130" height="90" rx="8" class="sd" opacity="0.8"/>
  <text x="182" y="238" class="t">Source</text>
  <text x="655" y="238" class="t">Drain</text>
  <rect x="310" y="170" width="280" height="16" rx="4" class="oxide"/>
  <text x="395" y="160" class="s">Gate oxide</text>
  <rect x="345" y="90" width="210" height="80" rx="8" class="gate"/>
  <text x="430" y="137" text-anchor="middle" style="font:22px Arial,sans-serif; fill:#1d1d1d">Gate</text>
  <rect x="300" y="186" width="300" height="84" rx="18" fill="#1f3b5b" stroke="#6ea8fe" stroke-width="2" stroke-dasharray="10 8"/>
  <text x="450" y="230" text-anchor="middle" class="t">Channel forms here</text>
  <line x1="450" y1="80" x2="450" y2="35" class="arr"/>
  <text x="468" y="36" class="s">Apply voltage</text>
  <circle cx="450" cy="72" r="6" fill="#ffd166"/>
  <line x1="280" y1="230" x2="620" y2="230" stroke="#06d6a0" stroke-width="6" stroke-dasharray="14 12"/>
  <text x="450" y="360" text-anchor="middle" class="s">Think of the gate as the handle that opens or pinches off a nanoscale switch.</text>
</svg>
