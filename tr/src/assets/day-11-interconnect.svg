<svg xmlns="http://www.w3.org/2000/svg" width="920" height="440" viewBox="0 0 920 440"><defs><style>.h{font:20px Arial,sans-serif;fill:#dbe7ff}.s{font:14px Arial,sans-serif;fill:#9fb4d9}.l{font:16px Arial,sans-serif;fill:#111827}.via{fill:#f59e0b}.cu{fill:#f97316}.ox{fill:#94a3b8}.si{fill:#22c55e}</style></defs><rect width="920" height="440" fill="#0b1020"/><text x="36" y="40" class="h">Interconnect stack: local wires below, global wires above</text><text x="36" y="66" class="s">Lower layers are dense and short; upper layers are thicker so long-distance signals lose less speed.</text><g transform="translate(110,100)"><rect x="0" y="240" width="700" height="60" class="si" opacity="0.4"/><text x="350" y="276" text-anchor="middle" class="h">Transistors</text><rect x="0" y="180" width="700" height="40" class="ox"/><rect x="60" y="188" width="90" height="24" class="cu"/><rect x="190" y="188" width="80" height="24" class="cu"/><rect x="315" y="188" width="100" height="24" class="cu"/><rect x="465" y="188" width="70" height="24" class="cu"/><rect x="575" y="188" width="75" height="24" class="cu"/><text x="715" y="205" class="s">M1 / local</text><rect x="0" y="120" width="700" height="40" class="ox"/><rect x="40" y="128" width="150" height="24" class="cu"/><rect x="250" y="128" width="130" height="24" class="cu"/><rect x="430" y="128" width="180" height="24" class="cu"/><text x="715" y="145" class="s">Middle metal</text><rect x="0" y="50" width="700" height="50" class="ox"/><rect x="80" y="58" width="260" height="30" class="cu"/><rect x="430" y="58" width="210" height="30" class="cu"/><text x="715" y="80" class="s">Global / power / clock</text><rect x="95" y="152" width="14" height="28" class="via"/><rect x="320" y="152" width="14" height="28" class="via"/><rect x="500" y="152" width="14" height="28" class="via"/><rect x="120" y="100" width="14" height="20" class="via"/><rect x="470" y="100" width="14" height="20" class="via"/><text x="725" y="170" class="s">Vias link layers vertically</text></g></svg>
