<svg xmlns="http://www.w3.org/2000/svg" width="940" height="430" viewBox="0 0 940 430"><defs><style>.h{font:20px Arial,sans-serif;fill:#dbe7ff}.s{font:14px Arial,sans-serif;fill:#9fb4d9}.t{font:16px Arial,sans-serif;fill:#111827}</style></defs><rect width="940" height="430" fill="#0b1020"/><text x="36" y="40" class="h">2.5D packaging: compute die + HBM on a silicon interposer</text><text x="36" y="66" class="s">Packaging wins by moving memory much closer and connecting it with many short, wide links.</text><g transform="translate(90,110)"><rect x="0" y="210" width="760" height="80" rx="10" fill="#334155"/><text x="380" y="258" text-anchor="middle" class="h">Package substrate</text><rect x="80" y="120" width="600" height="60" rx="8" fill="#64748b"/><text x="380" y="157" text-anchor="middle" class="h">Silicon interposer</text><rect x="260" y="20" width="220" height="80" rx="8" fill="#38bdf8"/><text x="370" y="66" text-anchor="middle" class="t">GPU / compute die</text><rect x="70" y="5" width="110" height="95" rx="8" fill="#f472b6"/><text x="125" y="56" text-anchor="middle" class="t">HBM</text><rect x="560" y="5" width="110" height="95" rx="8" fill="#f472b6"/><text x="615" y="56" text-anchor="middle" class="t">HBM</text><g fill="#f59e0b"><circle cx="105" cy="112" r="5"/><circle cx="125" cy="112" r="5"/><circle cx="145" cy="112" r="5"/><circle cx="335" cy="112" r="5"/><circle cx="355" cy="112" r="5"/><circle cx="375" cy="112" r="5"/><circle cx="395" cy="112" r="5"/><circle cx="415" cy="112" r="5"/><circle cx="595" cy="112" r="5"/><circle cx="615" cy="112" r="5"/><circle cx="635" cy="112" r="5"/></g><text x="700" y="105" class="s">Micro-bumps</text><text x="380" y="340" text-anchor="middle" class="s">Compared with a long PCB path, the interposer gives much shorter paths and much wider memory buses.</text></g></svg>
