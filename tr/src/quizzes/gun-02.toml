# Gün 2 Testi: Silikon Waferler — Kumdan İnsanlığın Ürettiği En Saf Maddeye

## Yeni Sorular (6)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Elektronik kaliteli silikon hangi saflık düzeyine ulaşır ve bu neden gereklidir?"
prompt.distractors = [
    "Altı-dokuzluk saflık (%99,9999), çünkü litografi araçlarının ışık yansıması için kusursuz optik bir yüzeye ihtiyacı vardır",
    "Dokuz-dokuzluk saflık (%99,9999999), çünkü tel kesme işlemi kimyasal olarak giderilmesi gereken yüzey altı hasarı oluşturur",
    "Sekiz-dokuzluk saflık (%99,999999), çünkü Czochralski süreci bu eşiğin üzerinde safsızlıkları bünyesine katamaz"
]
answer.answer = "Eleven-nines purity (99.999999999%), because even parts-per-billion impurities can trap electrons and kill transistors"
context = "Yarı iletken silikon %99,999999999 saflığa (on bir dokuz) ulaşır. Çip başına 100 milyar transistör ölçeğinde, yanlış yerleşmiş tek bir safsızlık atomu bile elektronları tuzağa düşürebilir, akım sızıntısına yol açabilir ve bir transistörü mahvedebilir."
id = "9337f0cf-ef8a-41f7-9cf6-b0eea4c4c785"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Siemens sürecinde borun triklorosilandan uzaklaştırılması, demir veya alüminyum safsızlıklarına kıyasla neden daha zordur?"
prompt.distractors = [
    "Bor, damıtma kolonunda standart basınçlarda kimyasal ayrıma direnen kararlı bir oksit tabakası oluşturur",
    "Bor atomlarının kütlesi silikonunkine neredeyse eşit olduğundan kesirli damıtmadaki santrifüj ayırma yöntemleri etkisiz kalır",
    "Bor triklorür, kolondaki hidrojen klorürle tepkimeye girerek TCS ile birlikte damıtılan karmaşık bileşikler oluşturur"
]
answer.answer = "Boron trichloride boils at 12.5°C, very close to trichlorosilane's 31.8°C boiling point, making distillation separation difficult"
context = "Demir klorür (316°C) ve alüminyum klorür (180°C), TCS'nin (31.8°C) kaynama noktasından çok uzak değerlere sahip olduğundan kolayca ayrılırlar. Ancak bor triklorür 12,5°C'de kaynar; TCS'den yalnızca 19°C düşüktür ve bu durum yüzlerce teorik tabla gerektiren damıtma kolonlarını zorunlu kılar."
id = "bb88d9b5-fd5a-4526-8e9a-a480cd3e7fee"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Sektörün 450mm waferlere geçiş planı neden 2017 civarında fiilen terk edildi?"
prompt.distractors = [
